<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图投影预览器 - EPSG Code Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v4.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        .projection-btn {
            transition: all 0.2s;
        }
        .projection-btn:hover {
            transform: translateX(4px);
        }
        .projection-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .map-container {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
            border-radius: 12px;
        }
        .code-box {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .copy-btn {
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #4f46e5;
            color: white;
        }
        .copy-btn.copied {
            background: #10b981;
            color: white;
        }
        #map-svg {
            width: 100%;
            height: 100%;
        }
        .graticule {
            fill: none;
            stroke-width: 0.5px;
        }
        .land {
            stroke-width: 0.5px;
        }
        .sphere {
            stroke-width: 1px;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-white">
    <div class="container mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                🗺️ 地图投影预览器
            </h1>
            <p class="text-slate-400 mt-2">探索不同EPSG投影坐标系，预览世界地图变形效果</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left Panel - Projection List -->
            <div class="lg:col-span-3">
                <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                    <div class="mb-4">
                        <input type="text" id="search-input" placeholder="搜索投影名称或EPSG代码..." 
                               class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <div class="mb-3">
                        <label class="text-xs text-slate-400 uppercase tracking-wider">分类方式</label>
                        <select id="filter-mode" class="w-full mt-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                            <option value="category">按区域分类</option>
                            <option value="type">按投影类型分类</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="text-xs text-slate-400 uppercase tracking-wider" id="filter-label">投影分类</label>
                        <select id="category-filter" class="w-full mt-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm">
                            <option value="all">全部投影</option>
                            <option value="world">世界投影</option>
                            <option value="utm">UTM投影</option>
                            <option value="national">国家/地区投影</option>
                            <option value="polar">极地投影</option>
                            <option value="custom">自定义投影</option>
                        </select>
                    </div>

                    <div class="text-xs text-slate-400 mb-2 uppercase tracking-wider">投影列表</div>
                    <div id="projection-list" class="space-y-1 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                    </div>
                </div>
            </div>

            <!-- Center Panel - Map Preview -->
            <div class="lg:col-span-6">
                <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                    <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
                        <div>
                            <h2 id="projection-title" class="font-bold text-lg">WGS 84 / Pseudo-Mercator</h2>
                            <p id="projection-epsg" class="text-sm text-slate-400">EPSG:3857</p>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <div class="flex items-center gap-1 text-sm">
                                <label class="text-slate-400">中心经度:</label>
                                <input type="number" id="center-lon" value="0" step="1" min="-180" max="180" 
                                       class="w-16 px-1 py-0.5 bg-slate-700 border border-slate-600 rounded text-xs">
                            </div>
                            <div class="flex items-center gap-1 text-sm">
                                <label class="text-slate-400">中心纬度:</label>
                                <input type="number" id="center-lat" value="0" step="1" min="-90" max="90" 
                                       class="w-16 px-1 py-0.5 bg-slate-700 border border-slate-600 rounded text-xs">
                            </div>
                            <div class="flex items-center gap-1 text-sm ml-100">
                                <label class="text-slate-400">经纬线:</label>
                                <input type="color" id="graticule-color" value="#ffffff" class="w-6 h-6 rounded cursor-pointer">
                            </div>
                            <div class="flex items-center gap-1 text-sm">
                                <label class="text-slate-400">陆地:</label>
                                <input type="color" id="land-color" value="#2dd4bf" class="w-6 h-6 rounded cursor-pointer">
                            </div>
                            <div class="flex items-center gap-1 text-sm">
                                <label class="text-slate-400">海洋:</label>
                                <input type="color" id="ocean-color" value="#1e3a5f" class="w-6 h-6 rounded cursor-pointer">
                            </div>
                            <div class="flex items-center gap-1 text-sm">
                                <label class="text-slate-400">国界:</label>
                                <input type="color" id="border-color" value="#0d9488" class="w-6 h-6 rounded cursor-pointer">
                            </div>
                            <button id="reset-colors" class="px-3 py-1 text-xs bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors">
                                默认颜色
                            </button>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" id="show-graticule" checked class="rounded">
                                <span class="text-slate-400">经纬网</span>
                            </label>
                            <label class="flex items-center gap-2 text-sm">
                                <input type="checkbox" id="show-sphere" checked class="rounded">
                                <span class="text-slate-400">球体轮廓</span>
                            </label>
                            <button id="reset-zoom" class="px-3 py-1 text-xs bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors">
                                重置缩放
                            </button>
                            <button id="export-png" class="px-3 py-1 text-xs bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                                导出PNG
                            </button>
                            <button id="export-svg" class="px-3 py-1 text-xs bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors">
                                导出SVG
                            </button>
                        </div>
                    </div>
                    <div class="map-container h-[500px] relative">
                        <svg id="map-svg"></svg>
                        <div id="error-message" class="absolute inset-0 flex items-center justify-center text-red-400 hidden">
                            <div class="text-center p-4">
                                <p class="text-lg mb-2">⚠️ 投影错误</p>
                                <p id="error-text" class="text-sm"></p>
                            </div>
                        </div>
                    </div>
                    <div class="px-4 py-3 border-t border-slate-700">
                        <div class="grid grid-cols-3 gap-4 text-center text-sm">
                            <div>
                                <div class="text-slate-400">投影类型</div>
                                <div id="projection-type" class="font-medium">圆柱投影</div>
                            </div>
                            <div>
                                <div class="text-slate-400">适用范围</div>
                                <div id="projection-extent" class="font-medium">全球</div>
                            </div>
                            <div>
                                <div class="text-slate-400">单位</div>
                                <div id="projection-units" class="font-medium">米</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Code Display -->
            <div class="lg:col-span-3 space-y-4">
                <!-- WKT -->
                <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                    <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
                        <h3 class="font-bold">WKT 格式</h3>
                        <button class="copy-btn px-3 py-1 text-xs border border-slate-600 rounded-lg" data-target="wkt-content">
                            复制
                        </button>
                    </div>
                    <div class="p-4">
                        <textarea id="wkt-content" class="code-box w-full h-40 bg-slate-900 p-3 rounded-lg border border-slate-700 resize-none focus:ring-2 focus:ring-blue-500 outline-none" readonly></textarea>
                    </div>
                </div>

                <!-- PROJ -->
                <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                    <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
                        <h3 class="font-bold">PROJ 字符串</h3>
                        <button class="copy-btn px-3 py-1 text-xs border border-slate-600 rounded-lg" data-target="proj-content">
                            复制
                        </button>
                    </div>
                    <div class="p-4">
                        <textarea id="proj-content" class="code-box w-full h-32 bg-slate-900 p-3 rounded-lg border border-slate-700 resize-none focus:ring-2 focus:ring-blue-500 outline-none" readonly></textarea>
                    </div>
                </div>

                <!-- Custom Input -->
                <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                    <div class="px-4 py-3 border-b border-slate-700">
                        <h3 class="font-bold">自定义投影</h3>
                    </div>
                    <div class="p-4 space-y-3">
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">PROJ 字符串</label>
                            <textarea id="custom-proj" class="code-box w-full h-20 bg-slate-900 p-3 rounded-lg border border-slate-700 resize-none focus:ring-2 focus:ring-blue-500 outline-none" placeholder="+proj=merc +lon_0=0 +k=1 +x_0=0 +y_0=0 +datum=WGS84 +units=m +no_defs"></textarea>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">WKT 字符串 (可选)</label>
                            <textarea id="custom-wkt" class="code-box w-full h-20 bg-slate-900 p-3 rounded-lg border border-slate-700 resize-none focus:ring-2 focus:ring-blue-500 outline-none" placeholder="PROJCS[&quot;WGS 84 / World Mercator&quot;,...]"></textarea>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">投影名称</label>
                            <input type="text" id="custom-name" class="w-full bg-slate-900 p-2 rounded-lg border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="我的自定义投影">
                        </div>
                        <button id="apply-custom" class="w-full py-2 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg font-medium hover:opacity-90 transition">
                            应用自定义投影
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-slate-500 text-sm">
            <p>数据来源: EPSG Registry | 使用 D3.js 和 Proj4js 实现</p>
        </footer>
    </div>

        // 世界地图数据
        let worldData = null;
        let currentProjection = projections[0];

        // 初始化
        async function init() {
            // 加载世界地图数据
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                worldData = await response.json();
            } catch (error) {
                console.error('Failed to load world data:', error);
            }

            renderProjectionList();
            setupEventListeners();
            selectProjection(projections[0]);
        }

        // 渲染投影列表
        function renderProjectionList(filter = '', category = 'all', filterMode = 'category') {
            const list = document.getElementById('projection-list');
            const filtered = projections.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(filter.toLowerCase()) || 
                                   p.id.toLowerCase().includes(filter.toLowerCase());
                let matchCategory = category === 'all';
                
                if (filterMode === 'category') {
                    matchCategory = category === 'all' || p.category === category;
                } else {
                    matchCategory = category === 'all' || p.type === category;
                }
                
                return matchSearch && matchCategory;
            });

            list.innerHTML = filtered.map(p => `
                <button class="projection-btn w-full text-left px-3 py-2 rounded-lg border border-slate-600 text-sm hover:border-blue-500 ${p.id === currentProjection.id ? 'active' : ''}" 
                        data-id="${p.id}">
                    <div class="font-medium">${p.name}</div>
                    <div class="text-xs opacity-70">${p.id}</div>
                </button>
            `).join('');

            // 绑定点击事件
            list.querySelectorAll('.projection-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const proj = projections.find(p => p.id === btn.dataset.id);
                    if (proj) selectProjection(proj);
                });
            });
        }

        // 选择投影
        function selectProjection(proj) {
            currentProjection = proj;
            
            // 更新UI
            document.getElementById('projection-title').textContent = proj.name;
            document.getElementById('projection-epsg').textContent = proj.id;
            document.getElementById('projection-type').textContent = proj.type;
            document.getElementById('projection-extent').textContent = proj.extent;
            document.getElementById('projection-units').textContent = proj.units;
            document.getElementById('wkt-content').value = proj.wkt;
            document.getElementById('proj-content').value = proj.proj;

            // 更新列表高亮
            document.querySelectorAll('.projection-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === proj.id);
            });

            // 渲染地图
            renderMap();
        }

        // 渲染地图
        let currentZoom = null;
        
        function renderMap() {
            const svg = d3.select('#map-svg');
            const container = svg.node().parentElement;
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg.attr('width', width).attr('height', height)
               .attr('viewBox', `0 0 ${width} ${height}`);
            svg.selectAll('*').remove();

            const errorMessage = document.getElementById('error-message');
            errorMessage.classList.add('hidden');

            try {
                const centerLon = parseFloat(document.getElementById('center-lon').value) || 0;
                const centerLat = parseFloat(document.getElementById('center-lat').value) || 0;
                const graticuleColor = document.getElementById('graticule-color').value;
                const landColor = document.getElementById('land-color').value;
                const oceanColor = document.getElementById('ocean-color').value;
                const borderColor = document.getElementById('border-color').value;
                
                const projection = currentProjection.d3Projection
                    .translate([width / 2, height / 2])
                    .scale(Math.min(width, height) / 5)
                    .center([centerLon, centerLat]);

                const path = d3.geoPath().projection(projection);

                // 创建主组元素用于缩放
                const g = svg.append('g').attr('class', 'map-group');

                // 绘制球体轮廓
                if (document.getElementById('show-sphere').checked) {
                    const sphere = { type: 'Sphere' };
                    g.append('path')
                        .datum(sphere)
                        .attr('class', 'sphere')
                        .attr('fill', oceanColor)
                        .attr('fill-opacity', '0.3')
                        .attr('stroke', graticuleColor)
                        .attr('stroke-opacity', '0.2')
                        .attr('stroke-width', '1px')
                        .attr('d', path);
                }

                // 绘制经纬网
                if (document.getElementById('show-graticule').checked) {
                    const graticule = d3.geoGraticule();
                    g.append('path')
                        .datum(graticule())
                        .attr('class', 'graticule')
                        .attr('fill', 'none')
                        .attr('stroke', graticuleColor)
                        .attr('stroke-opacity', '0.3')
                        .attr('stroke-width', '0.5px')
                        .attr('d', path);
                }

                // 绘制陆地
                if (worldData) {
                    const land = topojson.feature(worldData, worldData.objects.countries);
                    g.append('path')
                        .datum(land)
                        .attr('class', 'land')
                        .attr('fill', landColor)
                        .attr('stroke', borderColor)
                        .attr('stroke-width', '0.5px')
                        .attr('d', path);
                }

                // 设置缩放行为
                const zoom = d3.zoom()
                    .scaleExtent([0.5, 8])
                    .on('zoom', (event) => {
                        g.attr('transform', event.transform);
                    });

                svg.call(zoom);
                currentZoom = zoom;
                
            } catch (error) {
                console.error('Projection error:', error);
                errorMessage.classList.remove('hidden');
                document.getElementById('error-text').textContent = error.message;
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            // 搜索
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderProjectionList(e.target.value, document.getElementById('category-filter').value, document.getElementById('filter-mode').value);
            });

            // 分类方式切换
            document.getElementById('filter-mode').addEventListener('change', (e) => {
                const filterMode = e.target.value;
                const filterSelect = document.getElementById('category-filter');
                const filterLabel = document.getElementById('filter-label');
                
                if (filterMode === 'category') {
                    filterSelect.innerHTML = `
                        <option value="all">全部投影</option>
                        <option value="world">世界投影</option>
                        <option value="utm">UTM投影</option>
                        <option value="national">国家/地区投影</option>
                        <option value="polar">极地投影</option>
                        <option value="custom">自定义投影</option>
                    `;
                    filterLabel.textContent = '投影分类';
                } else {
                    filterSelect.innerHTML = `
                        <option value="all">全部投影</option>
                        <option value="圆柱投影">圆柱投影</option>
                        <option value="伪圆柱投影">伪圆柱投影</option>
                        <option value="圆锥投影">圆锥投影</option>
                        <option value="圆锥等面积投影">圆锥等面积投影</option>
                        <option value="横轴墨卡托投影">横轴墨卡托投影</option>
                        <option value="高斯-克吕格投影">高斯-克吕格投影</option>
                        <option value="方位投影">方位投影</option>
                        <option value="极地立体投影">极地立体投影</option>
                        <option value="圆柱等面积投影">圆柱等面积投影</option>
                        <option value="兰伯特等角圆锥投影">兰伯特等角圆锥投影</option>
                        <option value="兰伯特等面积方位投影">兰伯特等面积方位投影</option>
                        <option value="混合投影">混合投影</option>
                        <option value="地理坐标系">地理坐标系</option>
                        <option value="自定义">自定义</option>
                    `;
                    filterLabel.textContent = '投影类型';
                }
                
                renderProjectionList(document.getElementById('search-input').value, 'all', filterMode);
            });

            // 分类筛选
            document.getElementById('category-filter').addEventListener('change', (e) => {
                renderProjectionList(document.getElementById('search-input').value, e.target.value, document.getElementById('filter-mode').value);
            });

            // 显示选项
            document.getElementById('show-graticule').addEventListener('change', renderMap);
            document.getElementById('show-sphere').addEventListener('change', renderMap);

            // 颜色设置
            document.getElementById('graticule-color').addEventListener('input', renderMap);
            document.getElementById('land-color').addEventListener('input', renderMap);
            document.getElementById('ocean-color').addEventListener('input', renderMap);
            document.getElementById('border-color').addEventListener('input', renderMap);

            // 中心点设置
            document.getElementById('center-lon').addEventListener('change', renderMap);
            document.getElementById('center-lat').addEventListener('change', renderMap);

            // 恢复默认颜色
            document.getElementById('reset-colors').addEventListener('click', () => {
                document.getElementById('graticule-color').value = '#ffffff';
                document.getElementById('land-color').value = '#2dd4bf';
                document.getElementById('ocean-color').value = '#1e3a5f';
                document.getElementById('border-color').value = '#0d9488';
                renderMap();
            });

            // 重置缩放
            document.getElementById('reset-zoom').addEventListener('click', () => {
                const svg = d3.select('#map-svg');
                svg.transition().duration(300).call(d3.zoom().transform, d3.zoomIdentity);
            });

            // 导出PNG
            document.getElementById('export-png').addEventListener('click', () => {
                const svgElement = document.getElementById('map-svg');
                const svgClone = svgElement.cloneNode(true);
                
                const graticuleColor = document.getElementById('graticule-color').value;
                const landColor = document.getElementById('land-color').value;
                const oceanColor = document.getElementById('ocean-color').value;
                const borderColor = document.getElementById('border-color').value;
                
                const styleElement = document.createElement('style');
                styleElement.textContent = `
                    .graticule {
                        fill: none;
                        stroke: ${graticuleColor};
                        stroke-opacity: 0.3;
                        stroke-width: 0.5px;
                    }
                    .land {
                        fill: ${landColor};
                        stroke: ${borderColor};
                        stroke-width: 0.5px;
                    }
                    .sphere {
                        fill: ${oceanColor};
                        fill-opacity: 0.3;
                        stroke: ${graticuleColor};
                        stroke-opacity: 0.2;
                        stroke-width: 1px;
                    }
                `;
                svgClone.insertBefore(styleElement, svgClone.firstChild);
                
                const svgData = new XMLSerializer().serializeToString(svgClone);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const svgSize = svgElement.getBoundingClientRect();
                canvas.width = svgSize.width * 2;
                canvas.height = svgSize.height * 2;
                ctx.scale(2, 2);
                
                const img = new Image();
                const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);
                
                img.onload = function() {
                    ctx.fillStyle = oceanColor;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, svgSize.width, svgSize.height);
                    URL.revokeObjectURL(url);
                    
                    const link = document.createElement('a');
                    link.download = `map-${currentProjection.name.replace(/\s+/g, '-')}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
                
                img.onerror = function() {
                    console.error('Failed to load SVG for PNG export');
                    URL.revokeObjectURL(url);
                };
                
                img.src = url;
            });

            // 导出SVG
            document.getElementById('export-svg').addEventListener('click', () => {
                const svgElement = document.getElementById('map-svg');
                const svgClone = svgElement.cloneNode(true);
                
                const graticuleColor = document.getElementById('graticule-color').value;
                const landColor = document.getElementById('land-color').value;
                const oceanColor = document.getElementById('ocean-color').value;
                const borderColor = document.getElementById('border-color').value;
                
                const styleElement = document.createElement('style');
                styleElement.textContent = `
                    .graticule {
                        fill: none;
                        stroke: ${graticuleColor};
                        stroke-opacity: 0.3;
                        stroke-width: 0.5px;
                    }
                    .land {
                        fill: ${landColor};
                        stroke: ${borderColor};
                        stroke-width: 0.5px;
                    }
                    .sphere {
                        fill: ${oceanColor};
                        fill-opacity: 0.3;
                        stroke: ${graticuleColor};
                        stroke-opacity: 0.2;
                        stroke-width: 1px;
                    }
                `;
                svgClone.insertBefore(styleElement, svgClone.firstChild);
                
                svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                svgClone.setAttribute('width', svgElement.getAttribute('width'));
                svgClone.setAttribute('height', svgElement.getAttribute('height'));
                svgClone.setAttribute('viewBox', svgElement.getAttribute('viewBox'));
                
                const svgData = new XMLSerializer().serializeToString(svgClone);
                const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);
                
                const link = document.createElement('a');
                link.download = `map-${currentProjection.name.replace(/\s+/g, '-')}.svg`;
                link.href = url;
                link.click();
                
                URL.revokeObjectURL(url);
            });

            // 复制按钮
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = document.getElementById(btn.dataset.target);
                    navigator.clipboard.writeText(target.value).then(() => {
                        btn.classList.add('copied');
                        btn.textContent = '已复制';
                        setTimeout(() => {
                            btn.classList.remove('copied');
                            btn.textContent = '复制';
                        }, 2000);
                    });
                });
            });

            // 自定义投影
            document.getElementById('apply-custom').addEventListener('click', () => {
                const customProj = document.getElementById('custom-proj').value.trim();
                const customWkt = document.getElementById('custom-wkt').value.trim();
                const customName = document.getElementById('custom-name').value.trim() || '自定义投影';
                
                if (!customProj && !customWkt) {
                    alert('请输入 PROJ 字符串或 WKT 字符串');
                    return;
                }

                try {
                    if (customProj) {
                        proj4.defs('custom', customProj);
                    }
                    
                    let d3Proj = d3.geoEquirectangular();
                    
                    const parseProjParam = (projStr, param) => {
                        const regex = new RegExp(`\\+${param}=(-?\\d+\\.?\\d*)`, 'i');
                        const match = projStr.match(regex);
                        return match ? parseFloat(match[1]) : null;
                    };

                    if (customProj) {
                        const projLower = customProj.toLowerCase();
                        const lon0 = parseProjParam(customProj, 'lon_0');
                        const lat0 = parseProjParam(customProj, 'lat_0');
                        const latTs = parseProjParam(customProj, 'lat_ts');
                        const lat1 = parseProjParam(customProj, 'lat_1');
                        const lat2 = parseProjParam(customProj, 'lat_2');
                        
                        if (projLower.includes('+proj=merc')) {
                            d3Proj = d3.geoMercator();
                            if (lon0 !== null) d3Proj = d3Proj.center([lon0, 0]);
                        } else if (projLower.includes('+proj=eqc') || projLower.includes('+proj=plate')) {
                            d3Proj = d3.geoEquirectangular();
                            if (lon0 !== null) d3Proj = d3Proj.center([lon0, 0]);
                        } else if (projLower.includes('+proj=stere')) {
                            d3Proj = d3.geoStereographic();
                            if (lon0 !== null && lat0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, -lat0]);
                            } else if (lon0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, 0]);
                            }
                        } else if (projLower.includes('+proj=lcc')) {
                            d3Proj = d3.geoConicConformal();
                            if (lat1 !== null && lat2 !== null) d3Proj = d3Proj.parallels([lat1, lat2]);
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=aea') || projLower.includes('+proj=albers')) {
                            d3Proj = d3.geoAlbers();
                            if (lat1 !== null && lat2 !== null) d3Proj = d3Proj.parallels([lat1, lat2]);
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=laea')) {
                            d3Proj = d3.geoAzimuthalEqualArea();
                            if (lon0 !== null && lat0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, -lat0]);
                            } else if (lon0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, 0]);
                            }
                        } else if (projLower.includes('+proj=tmerc')) {
                            d3Proj = d3.geoTransverseMercator();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=moll')) {
                            d3Proj = d3.geoMollweide();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=robin')) {
                            d3Proj = d3.geoRobinson();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=mill')) {
                            d3Proj = d3.geoMiller();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=eck4')) {
                            d3Proj = d3.geoEckert4();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=hammer')) {
                            d3Proj = d3.geoHammer();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=gnom')) {
                            d3Proj = d3.geoGnomonic();
                            if (lon0 !== null && lat0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, -lat0]);
                            } else if (lon0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, 0]);
                            }
                        } else if (projLower.includes('+proj=aeqd')) {
                            d3Proj = d3.geoAzimuthalEquidistant();
                            if (lon0 !== null && lat0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, -lat0]);
                            } else if (lon0 !== null) {
                                d3Proj = d3Proj.rotate([-lon0, 0]);
                            }
                        } else if (projLower.includes('+proj=sinu')) {
                            d3Proj = d3.geoSinusoidal();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        } else if (projLower.includes('+proj=eqearth')) {
                            d3Proj = d3.geoEqualEarth();
                            if (lon0 !== null) d3Proj = d3Proj.rotate([-lon0, 0]);
                        }
                    }

                    const customProjection = {
                        id: 'CUSTOM_' + Date.now(),
                        name: customName,
                        category: 'custom',
                        type: '自定义',
                        extent: '自定义',
                        units: '米',
                        proj: customProj || '(无 PROJ 字符串)',
                        wkt: customWkt || '(无 WKT 字符串)',
                        d3Projection: d3Proj
                    };

                    selectProjection(customProjection);
                } catch (error) {
                    alert('投影字符串解析错误: ' + error.message);
                }
            });

            // 窗口大小变化
            window.addEventListener('resize', renderMap);

            // 方向键切换投影
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                const filter = document.getElementById('search-input').value;
                const category = document.getElementById('category-filter').value;
                const filterMode = document.getElementById('filter-mode').value;
                const filtered = projections.filter(p => {
                    const matchSearch = p.name.toLowerCase().includes(filter.toLowerCase()) || 
                                       p.id.toLowerCase().includes(filter.toLowerCase());
                    let matchCategory = category === 'all';
                    
                    if (filterMode === 'category') {
                        matchCategory = category === 'all' || p.category === category;
                    } else {
                        matchCategory = category === 'all' || p.type === category;
                    }
                    
                    return matchSearch && matchCategory;
                });

                if (filtered.length === 0) return;

                const currentIndex = filtered.findIndex(p => p.id === currentProjection.id);
                let newIndex = currentIndex;

                if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    newIndex = currentIndex <= 0 ? filtered.length - 1 : currentIndex - 1;
                } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    newIndex = currentIndex >= filtered.length - 1 ? 0 : currentIndex + 1;
                }

                if (newIndex !== currentIndex) {
                    selectProjection(filtered[newIndex]);
                    const btn = document.querySelector(`.projection-btn[data-id="${filtered[newIndex].id}"]`);
                    if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
