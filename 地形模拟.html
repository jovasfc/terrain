        const { demPng, demTxt, satPng, mapPng, openmapPng, satellitePng, esriPng, topoPng, natgeoPng, transportPng, reliefPng, osmPng, gaodePng } = findFilesInList(files);
        
        let loadedCount = 0;
        let messages = [];
        
        // 存储所有纹理图
        window.availableTextures = {};
        if (satPng) window.availableTextures.sat = satPng;
        if (openmapPng) window.availableTextures.openmap = openmapPng;
        if (mapPng) window.availableTextures.map = mapPng;
        if (satellitePng) window.availableTextures.satellite = satellitePng;
        if (esriPng) window.availableTextures.esri = esriPng;
        if (topoPng) window.availableTextures.topo = topoPng;
        if (natgeoPng) window.availableTextures.natgeo = natgeoPng;
        if (transportPng) window.availableTextures.transport = transportPng;
        if (reliefPng) window.availableTextures.relief = reliefPng;
        if (osmPng) window.availableTextures.osm = osmPng;
        if (gaodePng) window.availableTextures.gaode = gaodePng;
        
        // 导入数据时渲染精度设为360，高度系数设为0.3
        if (demPng || demTxt) {
            document.getElementById('detail-scale').value = 360;
            document.getElementById('detail-val').innerText = '360';
            // 导入时高度系数设为0.3（滑块值43对应范围0.01-30）
            document.getElementById('height-scale').value = 43;
            document.getElementById('height-val').innerText = '0.30x';
        }
        
        // 先加载高度数据 (dem.txt)，因为buildTerrain需要经纬度信息
        if (demTxt) {
            try {
                const text = await demTxt.text();
                const info = parseDemTxtContent(text);
                window.demInfo = info;
                displayDemInfo(info);
                loadedCount++;
                messages.push('高度数据');
            } catch (err) {
                console.error('加载高度数据失败:', err);
            }
        }
        
        // 加载高度图 (dem.png)
        if (demPng) {
            try {
                const url = URL.createObjectURL(demPng);
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    buildTerrain(canvas);
                    URL.revokeObjectURL(url);
                };
                img.src = url;
                loadedCount++;
                messages.push('高度图');
            } catch (err) {
                console.error('加载高度图失败:', err);
            }
        }
        
        // 自动处理纹理：如有纹理则套用，如无则清除
        const textureKeys = Object.keys(window.availableTextures);
        if (textureKeys.length > 0) {
            // 有纹理图，自动套用第一个可用的纹理
            const firstTextureKey = textureKeys[0];
            const firstTextureFile = window.availableTextures[firstTextureKey];
            
            try {
                const url = URL.createObjectURL(firstTextureFile);
                const loader = new THREE.TextureLoader();
                loader.load(url, (tex) => {
                    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                    customTexture = tex;
                    rebuildMaterial();
                    document.getElementById('remove-texture').classList.remove('hidden');
                    URL.revokeObjectURL(url);
                });
                loadedCount++;
                messages.push('纹理图');
            } catch (err) {
                console.error('加载纹理图失败:', err);
            }
        } else {
            // 无纹理图，自动清除纹理
            customTexture = null;
            rebuildMaterial();
            document.getElementById('remove-texture').classList.add('hidden');
            document.getElementById('texture-input').value = '';
        }
        
        // 如果有纹理图，显示纹理切换控件
        if (Object.keys(window.availableTextures).length > 0) {
            showTextureSwitcher();
        } else {
            // 无纹理图时隐藏纹理切换控件
            document.getElementById('texture-switcher').classList.add('hidden');
        }
        
        if (loadedCount > 0) {
            showImportStatus(`成功导入: ${messages.join(', ')}`);
        } else {
            // 无合格数据时弹出对话框
            alert('无合格数据\n\n未找到以下文件：\n• 高度图：文件名需包含 "dem.png"\n• 纹理图：文件名需包含 "sat.png"\n• DEM数据：文件名需包含 "dem.txt"\n\n请确保ZIP文件或文件夹中包含上述文件。');
            showImportStatus('未找到匹配的文件', true);
        }

        return { demPng, demTxt, satPng, openmapPng, mapPng };
    }

    // 处理ZIP文件导入
    async function handleZipImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        try {
            showImportStatus('正在解析ZIP文件...');
            const zip = await JSZip.loadAsync(file);
            const files = [];
            
            // 提取所有文件
            const promises = [];
            zip.forEach((relativePath, zipEntry) => {
                if (!zipEntry.dir) {
                    promises.push(
                        zipEntry.async('blob').then(blob => {
                            return new File([blob], zipEntry.name, { type: blob.type });
                        })
                    );
                }
            });
            
            const extractedFiles = await Promise.all(promises);
            await processImportedFiles(extractedFiles);
        } catch (err) {
            console.error('ZIP解析失败:', err);
            showImportStatus('ZIP文件解析失败', true);
        }
        
        // 清除输入，允许再次导入相同文件
        e.target.value = '';
    }

    // 处理文件夹导入
    async function handleFolderImport(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        await processImportedFiles(files);
        
        // 清除输入，允许再次导入相同文件
        e.target.value = '';
    }

    // 解析DEM文本文件，提取高度信息
    function parseDemTxtContent(text) {
        const info = {
            north: null,
            south: null,
            east: null,
            west: null,
            width: null,
            height: null,
            max: null,
            min: null,
            elevationRange: null
        };
        
        const lines = text.split('\n');
        
        for (const line of lines) {
            const trimmed = line.trim();
            
            // 匹配坐标信息
            if (trimmed.includes('北纬') || trimmed.includes('North')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.north = parseFloat(match[0]);
            }
            if (trimmed.includes('南纬') || trimmed.includes('South')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.south = parseFloat(match[0]);
            }
            if (trimmed.includes('东经') || trimmed.includes('East')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.east = parseFloat(match[0]);
            }
            if (trimmed.includes('西经') || trimmed.includes('West')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.west = parseFloat(match[0]);
            }
            
            // 匹配图像尺寸
            if (trimmed.includes('图像尺寸') || trimmed.includes('尺寸')) {
                const match = trimmed.match(/(\d+)\s*x\s*(\d+)/i);
                if (match) {
                    info.width = parseInt(match[1]);
                    info.height = parseInt(match[2]);
                }
            }
            
            // 匹配最高点
            if (trimmed.includes('最高点') || trimmed.includes('Max')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.max = parseFloat(match[0]);
            }
            
            // 匹配最低点
            if (trimmed.includes('最低点') || trimmed.includes('Min')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.min = parseFloat(match[0]);
            }
            
            // 匹配高差
            if (trimmed.includes('高差') || trimmed.includes('Range')) {
                const match = trimmed.match(/[\d.]+/);
                if (match) info.elevationRange = parseFloat(match[0]);
            }
        }
        
        // 如果没有高差但有最大最小值，计算高差
        if (!info.elevationRange && info.max !== null && info.min !== null) {
            info.elevationRange = info.max - info.min;
        }
        
        return info;
    }

    // 显示DEM信息
    function displayDemInfo(info) {
        const displayEl = document.getElementById('dem-info-display');
        if (!displayEl) return;

        let html = '<div class="font-bold text-orange-400 mb-1">DEM数据信息</div>';

        if (info.max !== null) {
            html += `<div class="text-orange-300">最高点: ${info.max.toFixed(2)}m</div>`;
        }
        if (info.min !== null) {
            html += `<div class="text-orange-300">最低点: ${info.min.toFixed(2)}m</div>`;
        }
        if (info.elevationRange !== null) {
            html += `<div class="text-orange-300">高差: ${info.elevationRange.toFixed(2)}m</div>`;
        }
        if (info.width && info.height) {
            html += `<div class="text-orange-300">像素: ${info.width} x ${info.height}</div>`;
        }
        if (info.north !== null && info.south !== null && info.east !== null && info.west !== null) {
            html += `<div class="mt-1 text-orange-500">坐标范围:</div>`;
            html += `<div class="text-orange-300">N:${info.north.toFixed(4)} S:${info.south.toFixed(4)}</div>`;
            html += `<div class="text-orange-300">E:${info.east.toFixed(4)} W:${info.west.toFixed(4)}</div>`;
            
            // 计算真实尺寸
            const avgLat = (info.north + info.south) / 2;
            const latDiff = Math.abs(info.north - info.south);
            const lonDiff = Math.abs(info.east - info.west);
            const realWidthKm = (lonDiff * 111 * Math.cos(avgLat * Math.PI / 180)).toFixed(1);
            const realHeightKm = (latDiff * 111).toFixed(1);
            html += `<div class="mt-1 text-orange-500">真实尺寸:</div>`;
            html += `<div class="text-orange-300">东西: ${realWidthKm} km</div>`;
            html += `<div class="text-orange-300">南北: ${realHeightKm} km</div>`;
        }

        displayEl.innerHTML = html;
        displayEl.classList.remove('hidden');
    }

    // 辅助函数：创建方位标记贴图

    // 添加基座和方位标记
    function addBaseAndDirections(terrainWidth, terrainHeight, segs, heightScale, scaleMultiplier, maxHeight) {
        const skirtDepth = parseFloat(document.getElementById('skirt-depth')?.value || 20);
        const baseHeight = -skirtDepth;
        const halfW = terrainWidth / 2;
        const halfH = terrainHeight / 2;
        
        // 侧面材质
        const sideMat = new THREE.MeshStandardMaterial({ 
            color: 0x3a3a3a, 
            roughness: 0.9, 
            metalness: 0.1,
            side: THREE.DoubleSide 
        });

        // 四壁几何数据
        const skirtVertices = [];
        const skirtIndices = [];
        const skirtUvs = [];
        
        // 四条边的边缘高度采样
        const edgeHeights = { top: [], bottom: [], left: [], right: [] };
        
        // 采样边缘高度
        for (let i = 0; i <= segs; i++) {
            const t = i / segs;
            // 顶边 (z = -halfH)
            const topIdx = i;
            // 底边 (z = halfH)
            const bottomIdx = segs * (segs + 1) + i;
            // 左边 (x = -halfW)
            const leftIdx = i * (segs + 1);
            // 右边 (x = halfW)
            const rightIdx = i * (segs + 1) + segs;
            
            edgeHeights.top.push(geometry.attributes.position.array[topIdx * 3 + 1]);
            edgeHeights.bottom.push(geometry.attributes.position.array[bottomIdx * 3 + 1]);
            edgeHeights.left.push(geometry.attributes.position.array[leftIdx * 3 + 1]);
            edgeHeights.right.push(geometry.attributes.position.array[rightIdx * 3 + 1]);
        }

        let vertexOffset = 0;

        // 前面 (z = -halfH)
        for (let i = 0; i <= segs; i++) {
            const x = -halfW + (terrainWidth * i / segs);
            const topY = edgeHeights.top[i];
            skirtVertices.push(x, topY, -halfH);
            skirtVertices.push(x, baseHeight, -halfH);
            skirtUvs.push(i / segs, 1);
            skirtUvs.push(i / segs, 0);
        }
        for (let i = 0; i < segs; i++) {
            skirtIndices.push(vertexOffset + i * 2, vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 2);
            skirtIndices.push(vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 3, vertexOffset + i * 2 + 2);
        }
        vertexOffset += (segs + 1) * 2;

        // 后面 (z = halfH)
        for (let i = 0; i <= segs; i++) {
            const x = halfW - (terrainWidth * i / segs);
            const topY = edgeHeights.bottom[segs - i];
            skirtVertices.push(x, topY, halfH);
            skirtVertices.push(x, baseHeight, halfH);
            skirtUvs.push(i / segs, 1);
            skirtUvs.push(i / segs, 0);
        }
        for (let i = 0; i < segs; i++) {
            skirtIndices.push(vertexOffset + i * 2, vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 2);
            skirtIndices.push(vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 3, vertexOffset + i * 2 + 2);
        }
        vertexOffset += (segs + 1) * 2;

        // 左面 (x = -halfW)
        for (let i = 0; i <= segs; i++) {
            const z = -halfH + (terrainHeight * i / segs);
            const topY = edgeHeights.left[i];
            skirtVertices.push(-halfW, topY, z);
            skirtVertices.push(-halfW, baseHeight, z);
            skirtUvs.push(i / segs, 1);
            skirtUvs.push(i / segs, 0);
        }
        for (let i = 0; i < segs; i++) {
            skirtIndices.push(vertexOffset + i * 2, vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 2);
            skirtIndices.push(vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 3, vertexOffset + i * 2 + 2);
        }
        vertexOffset += (segs + 1) * 2;

        // 右面 (x = halfW)
        for (let i = 0; i <= segs; i++) {
            const z = halfH - (terrainHeight * i / segs);
            const topY = edgeHeights.right[segs - i];
            skirtVertices.push(halfW, topY, z);
            skirtVertices.push(halfW, baseHeight, z);
            skirtUvs.push(i / segs, 1);
            skirtUvs.push(i / segs, 0);
        }
        for (let i = 0; i < segs; i++) {
            skirtIndices.push(vertexOffset + i * 2, vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 2);
            skirtIndices.push(vertexOffset + i * 2 + 1, vertexOffset + i * 2 + 3, vertexOffset + i * 2 + 2);
        }

        const skirtGeo = new THREE.BufferGeometry();
        skirtGeo.setAttribute('position', new THREE.Float32BufferAttribute(skirtVertices, 3));
        skirtGeo.setAttribute('uv', new THREE.Float32BufferAttribute(skirtUvs, 2));
        skirtGeo.setIndex(skirtIndices);
        skirtGeo.computeVertexNormals();

        skirtMesh = new THREE.Mesh(skirtGeo, sideMat);
        skirtMesh.receiveShadow = true;
        skirtMesh.castShadow = true;
        terrainGroup.add(skirtMesh);

        // 底部
        const bottomGeo = new THREE.PlaneBufferGeometry(terrainWidth, terrainHeight);
        bottomGeo.rotateX(Math.PI / 2);
        bottomGeo.translate(0, baseHeight, 0);
        bottomMesh = new THREE.Mesh(bottomGeo, sideMat);
        bottomMesh.receiveShadow = true;
        terrainGroup.add(bottomMesh);

        // 添加方位文字标记 (东、西、南、北)
        const directions = [
            { text: '北', pos: [0, baseHeight + 5, -halfH - 15], color: '#ef4444' },
            { text: '南', pos: [0, baseHeight + 5, halfH + 15], color: '#ffffff' },
            { text: '西', pos: [-halfW - 15, baseHeight + 5, 0], color: '#ffffff' },
            { text: '东', pos: [halfW + 15, baseHeight + 5, 0], color: '#ffffff' }
        ];

        directions.forEach(d => {
            const spriteMat = new THREE.SpriteMaterial({ 
                map: createDirectionTexture(d.text, d.color), 
                transparent: true 
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(...d.pos);
            sprite.scale.set(12, 12, 1);
            terrainGroup.add(sprite);
            
            // 添加一个辅助装饰线条
            const lineGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(d.pos[0] * 0.9, baseHeight, d.pos[2] * 0.9),
                new THREE.Vector3(d.pos[0] * 0.98, baseHeight, d.pos[2] * 0.98)
            ]);
            const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x444444 }));
            terrainGroup.add(line);
        });
    }

    function buildTerrain(canvas, skipContourCalc = false) {
        rawWidth = canvas.width; rawHeight = canvas.height;
        const data = canvas.getContext('2d').getImageData(0, 0, rawWidth, rawHeight).data;
        heightData = new Float32Array(rawWidth * rawHeight);
        for(let i=0; i<data.length; i+=4) heightData[i/4] = data[i];

        // 清除terrainGroup中的所有子对象
        while(terrainGroup.children.length > 0) {
            const obj = terrainGroup.children[0];
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
            }
            terrainGroup.remove(obj);
        }

        const segs = parseInt(document.getElementById('detail-scale').value);
        
        // 根据经纬度计算真实地形尺寸
        let terrainWidth, terrainHeight;
        const demInfo = window.demInfo;
        
        if (demInfo && demInfo.north !== null && demInfo.south !== null && 
            demInfo.east !== null && demInfo.west !== null) {
            // 有经纬度信息，计算真实尺寸
            const avgLat = (demInfo.north + demInfo.south) / 2;
            const latDiff = Math.abs(demInfo.north - demInfo.south);
            const lonDiff = Math.abs(demInfo.east - demInfo.west);
            
            // 东西长度（纬线长度）= 经度差 × 111km × cos(纬度)
            const realWidthMeters = lonDiff * 111000 * Math.cos(avgLat * Math.PI / 180);
            // 南北长度（经线长度）= 纬度差 × 111km
            const realHeightMeters = latDiff * 111000;
            
            // 缩放到合适的显示尺寸（保持真实比例）
            const maxDisplaySize = 300;
            const scaleFactor = maxDisplaySize / Math.max(realWidthMeters, realHeightMeters);
            terrainWidth = realWidthMeters * scaleFactor;
            terrainHeight = realHeightMeters * scaleFactor;
            
            // 存储真实尺寸信息供测量使用
            window.terrainRealSize = {
                realWidthMeters: realWidthMeters,
                realHeightMeters: realHeightMeters,
                displayWidth: terrainWidth,
                displayHeight: terrainHeight,
                avgLat: avgLat,
                north: demInfo.north,
                south: demInfo.south,
                east: demInfo.east,
                west: demInfo.west
            };
            
            console.log(`真实尺寸: ${realWidthMeters.toFixed(0)}m x ${realHeightMeters.toFixed(0)}m`);
            console.log(`显示尺寸: ${terrainWidth.toFixed(1)} x ${terrainHeight.toFixed(1)}`);
        } else {
            // 无经纬度信息，使用原始比例
            const aspectRatio = rawWidth / rawHeight;
            terrainWidth = 200 * Math.sqrt(aspectRatio);
            terrainHeight = 200 / Math.sqrt(aspectRatio);
            
            // 清除真实尺寸信息
            window.terrainRealSize = null;
        }
        
        geometry = new THREE.PlaneBufferGeometry(terrainWidth, terrainHeight, segs, segs);
        geometry.rotateX(-Math.PI/2);

        const pos = geometry.attributes.position.array;
        const heightSliderValue = parseFloat(document.getElementById('height-scale').value);
        const heightScale = logarithmicTransform(heightSliderValue, 0.01, 30);
        // 更新高度系数显示值
        document.getElementById('height-val').innerText = heightScale.toFixed(2) + 'x';
        const isSmooth = document.getElementById('render-mode-toggle').checked;
        const scaleMultiplier = isSmooth ? 0.5 : 0.3;
        
        // 计算原始高程范围（不受高度夸张影响）
        let rawMinHeight = Infinity;
        let rawMaxHeight = -Infinity;
        for (let i = 0; i < heightData.length; i++) {
            if (heightData[i] < rawMinHeight) rawMinHeight = heightData[i];
            if (heightData[i] > rawMaxHeight) rawMaxHeight = heightData[i];
        }
        
        // 存储原始高程范围供等高线和分层设色使用
        window.rawElevationRange = {
            min: rawMinHeight,
            max: rawMaxHeight,
            range: rawMaxHeight - rawMinHeight
        };
        
        let maxHeight = 0;
        let minHeight = Infinity;
        
        // 创建原始高程比例属性（用于等高线和分层设色）
        const rawElevationArray = new Float32Array((segs + 1) * (segs + 1));
        
        for(let i=0, j=0; i<pos.length; i+=3, j++) {
            const x = Math.floor((j % (segs + 1)) / segs * (rawWidth - 1));
            const y = Math.floor(Math.floor(j / (segs + 1)) / segs * (rawHeight - 1));
            const rawElevation = heightData[y * rawWidth + x];
            pos[i+1] = rawElevation * scaleMultiplier * heightScale;
            // 存储归一化的原始高程（0-1）
            rawElevationArray[j] = (rawElevation - rawMinHeight) / (rawMaxHeight - rawMinHeight);
            if(pos[i+1] > maxHeight) maxHeight = pos[i+1];
            if(pos[i+1] < minHeight) minHeight = pos[i+1];
        }
        
        // 添加原始高程属性到geometry
        geometry.setAttribute('aRawElevation', new THREE.BufferAttribute(rawElevationArray, 1));
        
        geometry.computeVertexNormals();

        // 自动计算最佳等高距（基于原始高程），仅在需要时计算
        if (rawMinHeight === Infinity) rawMinHeight = 0;
        if (rawMaxHeight === -Infinity) rawMaxHeight = 1;
        if (!skipContourCalc) {
            autoCalculateBestContourSpacing(rawMinHeight, rawMaxHeight);
        }

        material = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.1 });
        if(customTexture) material.map = customTexture;
        
        // 使用原始高程范围
        const maxHeightForShader = rawMaxHeight - rawMinHeight || 1;
        material.onBeforeCompile = getShaderCompileFunction(maxHeightForShader, rawMinHeight, rawMaxHeight);

        terrain = new THREE.Mesh(geometry, material);
        terrain.receiveShadow = terrain.castShadow = true;
        terrainGroup.add(terrain);
        
        terrainDimensions = { width: terrainWidth, height: terrainHeight };
        
        // 添加基座和方位标记
        addBaseAndDirections(terrainWidth, terrainHeight, segs, heightScale, scaleMultiplier, maxHeight);
        updateUniforms();
    }

    function getShaderCompileFunction(maxHeightForShader, rawMinHeight, rawMaxHeight) {
        const maxH = maxHeightForShader || 1;
        const minH = rawMinHeight || 0;
        const rangeH = (rawMaxHeight - rawMinHeight) || 1;
        return function(shader) {
            shader.uniforms.uPalette = { value: currentPalette.map(c => new THREE.Color(c)) };
            shader.uniforms.uSmooth = { value: isSmoothMode ? 1.0 : 0.0 };
            // 读取当前等高线状态
            const contourToggle = document.getElementById('contour-toggle');
            shader.uniforms.uShowContour = { value: contourToggle && contourToggle.checked ? 1.0 : 0.0 };
            shader.uniforms.uRemovePalette = { value: 0.0 };
            // 直接读取当前等高距设置
            const contourSliderValue = parseFloat(document.getElementById('contour-spacing').value);
            const contourLogValue = logarithmicTransform(contourSliderValue, 1, 50);
            const actualContourSpacing = calculateActualContourSpacing(contourLogValue);
            const grayContourSpacing = convertToGrayContourSpacing(actualContourSpacing);
            shader.uniforms.uContourSpacing = { value: grayContourSpacing };
            shader.uniforms.uContourWidth = { value: parseFloat(document.getElementById('contour-width').value) };
            shader.uniforms.uTextureOpacity = { value: 0.8 };
            shader.uniforms.uShowTexture = { value: 1.0 };
            shader.uniforms.uBaseColor = { value: new THREE.Color(0x808080) };
            shader.uniforms.uContourColor = { value: new THREE.Color(0xffffff) };
            shader.uniforms.uRawMinHeight = { value: minH };
            shader.uniforms.uRawHeightRange = { value: rangeH };
            
            material.userData.shader = shader;

            shader.vertexShader = `
                attribute float aRawElevation;
                varying float vHeight;
                varying float vRawElevation;
                ${shader.vertexShader}
            `.replace('#include <begin_vertex>', 
                `#include <begin_vertex>
                vHeight = position.y / ${maxH.toFixed(2)};
                vRawElevation = aRawElevation;`
            );

            shader.fragmentShader = `
                uniform vec3 uPalette[8];
                uniform float uSmooth;
                uniform float uShowContour;
                uniform float uRemovePalette;
                uniform float uContourSpacing;
                uniform float uContourWidth;
                uniform float uTextureOpacity;
                uniform float uShowTexture;
                uniform vec3 uBaseColor;
                uniform vec3 uContourColor;
                uniform float uRawMinHeight;
                uniform float uRawHeightRange;
                varying float vHeight;
                varying float vRawElevation;
                ${shader.fragmentShader}
            `.replace('#include <map_fragment>', `
                // 使用原始高程进行分层设色和等高线计算
                float h = clamp(vRawElevation, 0.0, 0.999);
                vec3 finalColor;

                if(uRemovePalette > 0.5) {
                    finalColor = uBaseColor;
                } else if(uSmooth > 0.5) {
                    float fIdx = h * 7.0;
                    int idx = int(floor(fIdx));
                    float t = fract(fIdx);
                    finalColor = mix(uPalette[idx], uPalette[idx+1], t);
                } else {
                    float fIdx = h * 8.0;
                    float idx = floor(fIdx);
                    float edge = smoothstep(0.96, 1.0, fract(fIdx));
                    vec3 c1 = uPalette[int(idx)];
                    vec3 c2 = uPalette[int(min(idx + 1.0, 7.0))];
                    finalColor = mix(c1, c2, edge * 0.1); 
                }

                diffuseColor.rgb = finalColor;

                #ifdef USE_MAP
                    if(uShowTexture > 0.5) {
                        vec4 texColor = texture2D(map, vUv);
                        diffuseColor.rgb = mix(diffuseColor.rgb, texColor.rgb, uTextureOpacity * texColor.a);
                    }
                #endif

                if(uShowContour > 0.5) {
                    // 等高距越大，等高线越稀疏（间距越大）
                    // 使用原始高程计算等高线
                    float contourFreq = uRawHeightRange / uContourSpacing;
                    float lineWidth = uContourWidth * 0.5;
                    float line = abs(fract(vRawElevation * contourFreq - 0.5) - 0.5) / fwidth(vRawElevation * contourFreq);
                    diffuseColor.rgb = mix(diffuseColor.rgb, uContourColor, (1.0 - smoothstep(0.0, lineWidth, line)) * 0.5);
                }
            `);
        };
    }

    function rebuildMaterial() {
        if(!terrain) return;
        
        // 使用存储的原始高程范围
        const rawRange = window.rawElevationRange || { min: 0, max: 76.5, range: 76.5 };
        const maxHeightForShader = rawRange.range || 1;
        
        material = new THREE.MeshStandardMaterial({ 
            roughness: 0.8, 
            metalness: 0.1,
            map: customTexture
        });
        
        material.onBeforeCompile = getShaderCompileFunction(maxHeightForShader, rawRange.min, rawRange.max);
        terrain.material = material;
        material.needsUpdate = true;
        updateUniforms();
    }

    function updateUniforms() {
        if(!material || !material.userData.shader) return;
        const shader = material.userData.shader;
        shader.uniforms.uPalette.value = currentPalette.map(c => new THREE.Color(c));
        shader.uniforms.uSmooth.value = isSmoothMode ? 1.0 : 0.0;
        shader.uniforms.uShowContour.value = document.getElementById('contour-toggle').checked ? 1.0 : 0.0;
        shader.uniforms.uRemovePalette.value = document.getElementById('remove-palette-toggle').checked ? 1.0 : 0.0;
        // 等高距：UI显示实际高程，shader使用灰度值
        const contourSliderValue = parseFloat(document.getElementById('contour-spacing').value);
        const contourLogValue = logarithmicTransform(contourSliderValue, 1, 50);
        // 计算实际高程等高距（用于显示）
        const actualContourSpacing = calculateActualContourSpacing(contourLogValue);
        // 转换为灰度等高距（用于shader绘制）
        const grayContourSpacing = convertToGrayContourSpacing(actualContourSpacing);
        shader.uniforms.uContourSpacing.value = grayContourSpacing;
        shader.uniforms.uContourWidth.value = parseFloat(document.getElementById('contour-width').value);
        // 更新原始高程范围uniform
        if (shader.uniforms.uRawHeightRange && window.rawElevationRange) {
            shader.uniforms.uRawHeightRange.value = window.rawElevationRange.range;
        }
        if(shader.uniforms.uTextureOpacity) {
            shader.uniforms.uTextureOpacity.value = parseFloat(document.getElementById('texture-opacity').value) / 100;
        }
        if(shader.uniforms.uBaseColor) {
            shader.uniforms.uBaseColor.value.set(document.getElementById('base-color').value);
        }
        if(shader.uniforms.uContourColor) {
            shader.uniforms.uContourColor.value.set(document.getElementById('contour-color').value);
        }
    }

    // 自动计算最佳等高距
    function autoCalculateBestContourSpacing(minHeight, maxHeight) {
        // 使用实际高程范围（来自demInfo，单位：米）
        const elevationRange = (window.demInfo && window.demInfo.elevationRange) ? window.demInfo.elevationRange : 50;
        
        if (elevationRange <= 0 || !isFinite(elevationRange)) {
            // 如果高度差为0、负数或无效，使用默认等高距20
            const defaultValue = 20;
            const x = Math.max(1, Math.round(50 / 50));
            const logRangeValue = Math.max(1, defaultValue / x);
            const sliderValue = inverseLogarithmicTransform(logRangeValue, 1, 50);
            document.getElementById('contour-spacing').value = sliderValue;
            document.getElementById('contour-spacing-val').innerText = defaultValue.toFixed(1);
            updateUniforms();
            return;
        }
        
        // 计算理想的等高距（约12条等高线）
        let ideal = elevationRange / 12;
        
        // 计算数量级
        const magnitude = Math.pow(10, Math.floor(Math.log10(ideal)));
        const res = ideal / magnitude;
        
        // 根据比例选择合适的步长
        let step;
        if (res < 1.5) {
            step = 1 * magnitude;
        } else if (res < 3.5) {
            step = 2 * magnitude;
        } else if (res < 7.5) {
            step = 5 * magnitude;
        } else {
            step = 10 * magnitude;
        }
        
        // 转换为滑块值（使用实际高程范围）
        const x = Math.max(1, Math.round(elevationRange / 50));
        const actualValue = step; // 实际等高距（米）
        const logRangeValue = Math.max(1, actualValue / x); // 基础等高距
        
        // 使用反向对数变换将基础等高距映射回滑块值（范围0-100）
        const sliderValue = inverseLogarithmicTransform(logRangeValue, 1, 50);
        
        // 更新UI
        document.getElementById('contour-spacing').value = sliderValue;
        document.getElementById('contour-spacing-val').innerText = actualValue.toFixed(1);
        
        // 更新uniforms
        updateUniforms();
    }

    // 计算实际等高距（使用实际高程范围）
    function calculateActualContourSpacing(sliderValue) {
        // 使用实际高程范围（来自demInfo，单位：米）
        const elevationRange = (window.demInfo && window.demInfo.elevationRange) ? window.demInfo.elevationRange : 50;
        const x = Math.max(1, Math.round(elevationRange / 50));
        return sliderValue * x;
    }

    // 将实际高程等高距转换为灰度等高距（用于shader绘制）
    function convertToGrayContourSpacing(actualSpacing) {
        // 实际高程范围（米）
        const actualElevationRange = (window.demInfo && window.demInfo.elevationRange) ? window.demInfo.elevationRange : 50;
        // 灰度范围（0-255）
        const grayRange = window.rawElevationRange ? window.rawElevationRange.range : 255;
        // 转换：实际等高距 / 实际高程范围 * 灰度范围
        return actualSpacing / actualElevationRange * grayRange;
    }

    // 计算实际等高线高程值（使用实际高程范围和最低高程）
    function calculateActualContourLevel(contourLevel) {
        const elevationRange = (window.demInfo && window.demInfo.elevationRange) ? window.demInfo.elevationRange : 50;
        const minElevation = (window.demInfo && window.demInfo.min) ? window.demInfo.min : 0;
        const x = Math.max(1, Math.round(elevationRange / 50));
        return contourLevel * x + minElevation;
    }

    // 创建高程标签
    function createElevationLabel(text, position) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 128;
        canvas.height = 48;
        
        // 背景
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 边框
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
        
        // 文字
        ctx.font = 'bold 24px Arial';
        ctx.fillStyle = '#000000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        
        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(material);
        sprite.position.copy(position);
        sprite.position.y += 5;
        sprite.scale.set(15, 5.6, 1);
        
        return sprite;
    }

    function createTextSprite(text, position, scale = 5) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 128;
        canvas.height = 64;
        
        // 背景
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 文字
        ctx.font = 'bold 32px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        
        // 边框
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
        
        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(material);
        sprite.position.copy(position);
        sprite.scale.set(scale * 2, scale, 1);
        
        return sprite;
    }

    function updateContourLabels() {
        // 清除旧的等高线标签
        if(contourLabelsGroup) {
            scene.remove(contourLabelsGroup);
            contourLabelsGroup = null;
        }

        const showLabels = document.getElementById('contour-labels-toggle').checked;
        const showContours = document.getElementById('contour-toggle').checked;

        if(!showLabels || !showContours || !terrain || !heightData) return;

        contourLabelsGroup = new THREE.Group();

        const sliderValue = parseFloat(document.getElementById('contour-spacing').value);
        const logValue = logarithmicTransform(sliderValue, 1, 50);
        const actualContourSpacing = calculateActualContourSpacing(logValue);
        const segs = parseInt(document.getElementById('detail-scale').value);
        const pos = terrain.geometry.attributes.position.array;

        // 计算地形的高度范围
        let minHeight = Infinity, maxHeight = -Infinity;
        for(let i = 1; i < pos.length; i += 3) {
            minHeight = Math.min(minHeight, pos[i]);
            maxHeight = Math.max(maxHeight, pos[i]);
        }

        // 计算等高线层级（使用实际等高距）
        const firstContour = Math.ceil(minHeight / actualContourSpacing) * actualContourSpacing;
        const lastContour = Math.floor(maxHeight / actualContourSpacing) * actualContourSpacing;

        // 创建网格高度数组（用于等高线追踪）
        const grid = [];
        for(let y = 0; y <= segs; y++) {
            grid[y] = [];
            for(let x = 0; x <= segs; x++) {
                const idx = y * (segs + 1) + x;
                grid[y][x] = pos[idx * 3 + 1];
            }
        }

        // 为每个等高线层级生成标签
        const addedLabels = new Set();
        const minLabelDistance = Math.max(5, segs * 0.5); // 最小标签间距（减小以放置更多标签）

        for(let level = firstContour; level <= lastContour; level += actualContourSpacing) {
            // 追踪该层级的等高线路径
            const paths = generateContourPathsForLabels(level, segs, grid, pos);

            // 在每条等高线路径上放置标签
            paths.forEach(path => {
                if(path.length < 3) return; // 太短的线不放置标签

                // 计算路径上各点的累积距离
                const cumulativeDistances = [0];
                for(let i = 1; i < path.length; i++) {
                    const dx = path[i].x - path[i-1].x;
                    const dy = path[i].y - path[i-1].y;
                    cumulativeDistances.push(cumulativeDistances[i-1] + Math.sqrt(dx * dx + dy * dy));
                }
                const totalLength = cumulativeDistances[cumulativeDistances.length - 1];

                // 根据路径长度决定放置多少个标签（每条等高线至少放一个标签）
                const numLabels = Math.max(1, Math.min(3, Math.floor(totalLength / minLabelDistance)));
                const labelSpacing = totalLength / numLabels;

                // 在路径上均匀放置多个标签
                for(let labelIdx = 0; labelIdx < numLabels; labelIdx++) {
                    const targetDist = labelSpacing * (labelIdx + 0.5);

                    // 找到最接近目标距离的点
                    let bestIdx = 0;
                    let bestDiff = Math.abs(cumulativeDistances[0] - targetDist);
                    for(let i = 1; i < cumulativeDistances.length; i++) {
                        const diff = Math.abs(cumulativeDistances[i] - targetDist);
                        if(diff < bestDiff) {
                            bestDiff = diff;
                            bestIdx = i;
                        }
                    }

                    const point = path[bestIdx];

                    // 检查与已有标签的距离（只检查同一层级的标签，避免同一等高线上标签重叠）
                    let tooClose = false;
                    for(const label of addedLabels) {
                        // 只检查同一层级的标签
                        if(label.level !== level) continue;
                        const dx = label.x - point.x;
                        const dy = label.y - point.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if(dist < minLabelDistance) {
                            tooClose = true;
                            break;
                        }
                    }

                    if(!tooClose) {
                        addedLabels.add({x: point.x, y: point.y, level: level});

                        const worldX = point.worldX;
                        const worldZ = point.worldZ;
                        const worldY = point.worldY + 2; // 稍微抬高避免遮挡

                        // 计算实际显示的高程值
                        const actualLevel = calculateActualContourLevel(level);
                        const label = createTextSprite(actualLevel.toFixed(0) + 'm',
                            new THREE.Vector3(worldX, worldY, worldZ),
                            4);
                        contourLabelsGroup.add(label);
                    }
                }
            });
        }

        if(contourLabelsGroup.children.length > 0) {
            scene.add(contourLabelsGroup);
        }
    }

    // 为标签生成等高线路径（改进版，使用网格追踪）
    function generateContourPathsForLabels(targetLevel, segs, grid, pos) {
        const paths = [];
        const visited = new Set();

        // 遍历网格查找等高线起点
        for(let y = 0; y < segs; y++) {
            for(let x = 0; x < segs; x++) {
                const key = `${x},${y}`;
                if(visited.has(key)) continue;

                const h1 = grid[y][x];
                const h2 = grid[y][x+1];
                const h3 = grid[y+1][x];
                const h4 = grid[y+1][x+1];

                // 检查是否跨越等高线（检查四条边）
                const crosses = (h1 <= targetLevel && h2 >= targetLevel) || (h1 >= targetLevel && h2 <= targetLevel) || // 上边
                               (h2 <= targetLevel && h4 >= targetLevel) || (h2 >= targetLevel && h4 <= targetLevel) || // 右边
                               (h4 <= targetLevel && h3 >= targetLevel) || (h4 >= targetLevel && h3 <= targetLevel) || // 下边
                               (h3 <= targetLevel && h1 >= targetLevel) || (h3 >= targetLevel && h1 <= targetLevel);   // 左边

                if(crosses) {
                    const path = traceContourPath(targetLevel, x, y, segs, grid, pos, visited);
                    if(path.length > 5) { // 只保留足够长的路径
                        paths.push(path);
                    }
                }
            }
        }

        // 如果没有找到任何路径，尝试在整个网格中搜索
        if(paths.length === 0) {
            // 尝试从边界开始追踪
            for(let y = 0; y < segs; y++) {
                for(let x = 0; x < segs; x++) {
                    const h1 = grid[y][x];
                    const h2 = grid[y][x+1];
                    const h3 = grid[y+1][x];
                    const h4 = grid[y+1][x+1];

                    // 检查是否跨越等高线
                    const crosses = (h1 <= targetLevel && h2 >= targetLevel) || (h1 >= targetLevel && h2 <= targetLevel) ||
                                   (h2 <= targetLevel && h4 >= targetLevel) || (h2 >= targetLevel && h4 <= targetLevel) ||
                                   (h4 <= targetLevel && h3 >= targetLevel) || (h4 >= targetLevel && h3 <= targetLevel) ||
                                   (h3 <= targetLevel && h1 >= targetLevel) || (h3 >= targetLevel && h1 <= targetLevel);

                    if(crosses) {
                        const localVisited = new Set();
                        const path = traceContourPath(targetLevel, x, y, segs, grid, pos, localVisited);
                        if(path.length > 5) {
                            paths.push(path);
                            // 将访问过的单元格添加到全局visited
                            localVisited.forEach(k => visited.add(k));
                        }
                    }
                }
            }
        }

        return paths;
    }

    // 追踪单条等高线路径（改进版Marching Squares）
    function traceContourPath(targetLevel, startX, startY, segs, grid, pos, visited) {
        const path = [];
        let x = startX, y = startY;
        let maxSteps = segs * 4;
        let steps = 0;
        let prevEdge = -1; // 记录上一条边，避免来回震荡

        while(steps < maxSteps) {
            const key = `${x},${y}`;
            if(visited.has(key)) break;
            visited.add(key);

            // 在当前单元格中找到等高线交点
            const h1 = grid[y][x];
            const h2 = grid[y][x+1];
            const h3 = grid[y+1][x];
            const h4 = grid[y+1][x+1];

            // 计算四条边上的交点
            const intersections = [];

            // 上边 (y=0)
            if((h1 <= targetLevel && h2 >= targetLevel) || (h1 >= targetLevel && h2 <= targetLevel)) {
                const t = (targetLevel - h1) / (h2 - h1);
                intersections.push({px: x + t, py: y, edge: 0, nx: 0, ny: -1});
            }
            // 右边 (x=1)
            if((h2 <= targetLevel && h4 >= targetLevel) || (h2 >= targetLevel && h4 <= targetLevel)) {
                const t = (targetLevel - h2) / (h4 - h2);
                intersections.push({px: x + 1, py: y + t, edge: 1, nx: 1, ny: 0});
            }
            // 下边 (y=1)
            if((h4 <= targetLevel && h3 >= targetLevel) || (h4 >= targetLevel && h3 <= targetLevel)) {
                const t = (targetLevel - h4) / (h3 - h4);
                intersections.push({px: x + 1 - t, py: y + 1, edge: 2, nx: 0, ny: 1});
            }
            // 左边 (x=0)
            if((h3 <= targetLevel && h1 >= targetLevel) || (h3 >= targetLevel && h1 <= targetLevel)) {
                const t = (targetLevel - h3) / (h1 - h3);
                intersections.push({px: x, py: y + 1 - t, edge: 3, nx: -1, ny: 0});
            }

            if(intersections.length < 2) break;

            // 选择正确的交点（避免来回震荡）
            let selectedIntersection;
            if(intersections.length === 2) {
                // 如果只有两个交点，选择不是上一条边的那个
                if(intersections[0].edge === prevEdge) {
                    selectedIntersection = intersections[1];
                } else {
                    selectedIntersection = intersections[0];
                }
            } else {
                // 多个交点时，选择第一个不是上一条边的
                selectedIntersection = intersections.find(i => i.edge !== prevEdge) || intersections[0];
            }

            const {px, py, edge, nx, ny} = selectedIntersection;
            prevEdge = (edge + 2) % 4; // 记录对边，下次不会选回来

            // 转换为世界坐标
            const gridX = Math.min(Math.max(Math.round(px), 0), segs);
            const gridY = Math.min(Math.max(Math.round(py), 0), segs);
            const idx = gridY * (segs + 1) + gridX;
            const posIdx = idx * 3;

            path.push({
                x: px,
                y: py,
                worldX: pos[posIdx],
                worldY: pos[posIdx + 1],
                worldZ: pos[posIdx + 2]
            });

            // 移动到下一个单元格
            const nextX = x + nx;
            const nextY = y + ny;

            if(nextX < 0 || nextX >= segs || nextY < 0 || nextY >= segs) break;

            x = nextX;
            y = nextY;
            steps++;
        }

        return path;
    }

    // 恢复导出设置
    function restoreExportSettings(detailScale, baseColor, contourColor, heightScale, contourWidth, contourSpacing, 
        contourToggle, contourLabelsToggle, removePaletteToggle) {
        document.getElementById('detail-scale').value = detailScale;
        document.getElementById('base-color').value = baseColor;
        document.getElementById('contour-color').value = contourColor;
        // heightScale是实际值，使用反向对数变换将实际值映射回滑块值
        const heightSliderValue = inverseLogarithmicTransform(heightScale, 0.01, 30);
        document.getElementById('height-scale').value = heightSliderValue;
        document.getElementById('contour-width').value = contourWidth;
        // contourSpacing是实际值，使用反向对数变换将实际值映射回滑块值
        const contourSliderValue = inverseLogarithmicTransform(contourSpacing, 1, 50);
        document.getElementById('contour-spacing').value = contourSliderValue;
        document.getElementById('contour-toggle').checked = contourToggle;
        document.getElementById('contour-labels-toggle').checked = contourLabelsToggle;
        document.getElementById('remove-palette-toggle').checked = removePaletteToggle;
        
        // 更新显示值
        document.getElementById('detail-val').innerText = detailScale;
        document.getElementById('contour-width-val').innerText = contourWidth;
        document.getElementById('contour-spacing-val').innerText = contourSpacing.toFixed(1);
        document.getElementById('height-val').innerText = heightScale.toFixed(2) + 'x';
        
        // 只更新uniforms和高度，不重新构建地形
        updateUniforms();
        if(terrain) {
            terrain.scale.y = heightScale;
        }
    }

    // 导出全部（SVG、PNG、DEM）
    async function exportAll() {
        if(!heightData) {
            alert('请先导入高度图');
            return;
        }

        showImportStatus('正在导出...');

        const zip = new JSZip();
        const timestamp = new Date().getTime();

        // 保存当前设置
        const originalBaseColor = document.getElementById('base-color').value;
        const originalContourColor = document.getElementById('contour-color').value;
        const originalDetailScale = document.getElementById('detail-scale').value;
        // 保存实际高度系数（对数变换后的值）
        const originalHeightSliderValue = parseFloat(document.getElementById('height-scale').value);
        const originalHeightScale = logarithmicTransform(originalHeightSliderValue, 0.01, 30);
        const originalContourWidth = document.getElementById('contour-width').value;
        // 保存实际等高距（对数变换后的值）
        const originalContourSliderValue = parseFloat(document.getElementById('contour-spacing').value);
        const originalContourSpacing = logarithmicTransform(originalContourSliderValue, 1, 50);
        const originalContourToggle = document.getElementById('contour-toggle').checked;
        const originalContourLabelsToggle = document.getElementById('contour-labels-toggle').checked;
        const originalRemovePaletteToggle = document.getElementById('remove-palette-toggle').checked;

        // 自动设置导出参数
        document.getElementById('detail-scale').value = 90;
        document.getElementById('base-color').value = '#ffffff';
        document.getElementById('contour-color').value = '#000000';
        // 高度系数0对应滑块值0（对数变换后接近0.01）
        document.getElementById('height-scale').value = 0;
        document.getElementById('contour-width').value = 3;
        // 等高距10对应滑块值59（对数变换范围1-50）
        document.getElementById('contour-spacing').value = 59;
        document.getElementById('contour-toggle').checked = true;
        document.getElementById('contour-labels-toggle').checked = true;
        document.getElementById('remove-palette-toggle').checked = true;
        
        // 更新显示值
        document.getElementById('detail-val').innerText = '90';
        document.getElementById('contour-width-val').innerText = '3.0';
        document.getElementById('contour-spacing-val').innerText = '10.0';
        
        updateDetail();
        updateUniforms();
        updateHeight();

        // 1. 生成SVG
        const svgContent = await generateSvgContent();
        zip.file('contour.svg', svgContent);

        // 2. 生成PNG
        const pngDataUrl = await generatePngContent();
        const pngBase64 = pngDataUrl.split(',')[1];
        zip.file('contour.png', pngBase64, { base64: true });

        // 3. 生成DEM
        const demDataUrl = generateDemContent();
        const demBase64 = demDataUrl.split(',')[1];
        zip.file('dem.png', demBase64, { base64: true });

        // 4. 生成ZIP并下载
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `dem_${timestamp}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);

        showImportStatus('导出完成！');

        // 恢复原始设置
        restoreExportSettings(originalDetailScale, originalBaseColor, originalContourColor, originalHeightScale, 
            originalContourWidth, originalContourSpacing, originalContourToggle, originalContourLabelsToggle, originalRemovePaletteToggle);
    }

    // 生成SVG内容
    function generateSvgContent() {
        return new Promise((resolve) => {
            const sliderValue = parseFloat(document.getElementById('contour-spacing').value);
            const logValue = logarithmicTransform(sliderValue, 1, 50);
            const actualContourSpacing = calculateActualContourSpacing(logValue);

            const gridWidth = rawWidth;
            const gridHeight = rawHeight;

            let minHeight = Infinity, maxHeight = -Infinity;
            for(let i = 0; i < heightData.length; i++) {
                minHeight = Math.min(minHeight, heightData[i]);
                maxHeight = Math.max(maxHeight, heightData[i]);
            }

            const canvasWidth = 1600;
            const canvasHeight = Math.round(canvasWidth * (gridHeight / gridWidth));

            const firstContour = Math.ceil(minHeight / actualContourSpacing) * actualContourSpacing;
            const lastContour = Math.floor(maxHeight / actualContourSpacing) * actualContourSpacing;

            const contourLevels = [];
            for(let level = firstContour; level <= lastContour; level += actualContourSpacing) {
                contourLevels.push(level);
            }

            let svgContent = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            svgContent += `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasWidth}" height="${canvasHeight}" viewBox="0 0 ${canvasWidth} ${canvasHeight}">\n`;
            svgContent += `  <defs>\n`;
            svgContent += `    <style>\n`;
            svgContent += `      .contour-line { fill: none; stroke: #000; stroke-width: 0.8; }\n`;
            svgContent += `      .contour-label { font-family: Arial, sans-serif; font-size: 10px; fill: #000; }\n`;
            svgContent += `      .background { fill: #ffffff; }\n`;
            svgContent += `    </style>\n`;
            svgContent += `  </defs>\n`;
            svgContent += `  <rect class="background" width="100%" height="100%"/>\n`;

            contourLevels.forEach((level, index) => {
                const paths = generateContourPathsFromHeightData(level, gridWidth, gridHeight, heightData, canvasWidth, canvasHeight);
                if(paths.length > 0) {
                    svgContent += `  <!-- 等高线 ${level.toFixed(1)}m -->\n`;
                    paths.forEach(path => {
                        svgContent += `  <path class="contour-line" d="${path.d}"/>\n`;
                    });
                }
            });

            const addedLabels = new Set();
            const labelSpacing = Math.max(1, Math.floor(gridWidth / 20));

            contourLevels.forEach(level => {
                for(let y = 0; y < gridHeight; y += labelSpacing) {
                    for(let x = 0; x < gridWidth; x += labelSpacing) {
                        const idx = y * gridWidth + x;
                        const h = heightData[idx];

                        const contourLevel = Math.round(h / actualContourSpacing) * actualContourSpacing;
                        const distance = Math.abs(h - contourLevel);

                        if(distance < actualContourSpacing * 0.15 && contourLevel === level) {
                            const labelKey = `${contourLevel.toFixed(1)}_${Math.floor(x/labelSpacing)}_${Math.floor(y/labelSpacing)}`;
                            if(!addedLabels.has(labelKey)) {
                                addedLabels.add(labelKey);

                                const svgX = (x / gridWidth) * canvasWidth;
                                const svgY = canvasHeight - (y / gridHeight) * canvasHeight;

                                const actualLevel = calculateActualContourLevel(contourLevel);
                                svgContent += `  <text class="contour-label" x="${svgX.toFixed(1)}" y="${svgY.toFixed(1)}" text-anchor="middle" dominant-baseline="middle">${actualLevel.toFixed(0)}m</text>\n`;
                            }
                        }
                    }
                }
            });

            svgContent += `</svg>\n`;
            resolve(svgContent);
        });
    }

    // 生成PNG内容
    function generatePngContent() {
        return new Promise((resolve) => {
            const originalCameraPosition = camera.position.clone();
            const originalCameraRotation = camera.rotation.clone();
            const originalControlsTarget = controls.target.clone();
            const originalRendererSize = renderer.getSize(new THREE.Vector2());
            const originalCameraAspect = camera.aspect;

            const canvas = document.createElement('canvas');
            canvas.width = rawWidth;
            canvas.height = rawHeight;
            const ctx = canvas.getContext('2d');
            const img = ctx.createImageData(rawWidth, rawHeight);
            for(let i=0; i<img.data.length; i+=4) {
                img.data[i] = heightData[i/4];
                img.data[i+1] = heightData[i/4];
                img.data[i+2] = heightData[i/4];
                img.data[i+3] = 255;
            }
            ctx.putImageData(img, 0, 0);

            const originalTerrain = terrain;
            const originalGeometry = geometry;
            const originalMaterial = material;
            
            // 保存原始terrainGroup的子对象
            const originalChildren = [...terrainGroup.children];

            buildTerrain(canvas);

            const aspectRatio = rawWidth / rawHeight;
            const exportSize = 1600;
            let renderWidth, renderHeight;

            if (aspectRatio >= 1) {
                renderWidth = exportSize;
                renderHeight = exportSize / aspectRatio;
            } else {
                renderWidth = exportSize * aspectRatio;
                renderHeight = exportSize;
            }

            renderer.setSize(renderWidth, renderHeight);
            camera.aspect = renderWidth / renderHeight;
            camera.updateProjectionMatrix();

            // 计算地形的边界
            const terrainAspectRatio = rawWidth / rawHeight;
            const terrainWidth = 200 * Math.sqrt(terrainAspectRatio);
            const terrainHeight = 200 / Math.sqrt(terrainAspectRatio);

            // 计算相机高度，使视野精确覆盖地形
            // 使用正交相机或透视相机的FOV计算
            const fov = camera.fov * (Math.PI / 180);
            const halfFov = fov / 2;
            
            // 根据地形尺寸和相机FOV计算需要的相机高度
            // tan(halfFov) = (halfSize) / distance
            // distance = (halfSize) / tan(halfFov)
            const halfTerrainWidth = terrainWidth / 2;
            const halfTerrainHeight = terrainHeight / 2;
            
            // 计算两个方向需要的距离，取较大值以确保完全覆盖
            const distanceForWidth = halfTerrainWidth / Math.tan(halfFov);
            const distanceForHeight = halfTerrainHeight / Math.tan(halfFov);
            const cameraDistance = Math.max(distanceForWidth, distanceForHeight);
            
            // 设置相机为正上方视角，精确覆盖地形
            camera.position.set(0, cameraDistance * 1.05, 0);
            camera.lookAt(0, 0, 0);
            camera.up.set(0, 0, -1);
            controls.target.set(0, 0, 0);

            requestAnimationFrame(() => {
                for(let i = 0; i < 5; i++) {
                    renderer.render(scene, camera);
                }

                const dataURL = renderer.domElement.toDataURL('image/png');

                // 清除当前terrainGroup的子对象
                while(terrainGroup.children.length > 0) {
                    const obj = terrainGroup.children[0];
                    if(obj.geometry && obj !== originalTerrain) obj.geometry.dispose();
                    if(obj.material && obj !== originalTerrain) {
                        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                        else obj.material.dispose();
                    }
                    terrainGroup.remove(obj);
                }
                
                // 恢复原始子对象
                originalChildren.forEach(child => {
                    terrainGroup.add(child);
                });
                
                terrain = originalTerrain;
                geometry = originalGeometry;
                material = originalMaterial;

                renderer.setSize(originalRendererSize.width, originalRendererSize.height);
                camera.aspect = originalCameraAspect;
                camera.updateProjectionMatrix();

                camera.position.copy(originalCameraPosition);
                camera.rotation.copy(originalCameraRotation);
                controls.target.copy(originalControlsTarget);
                controls.update();

                resolve(dataURL);
            });
        });
    }

    // 生成DEM内容
    function generateDemContent() {
        const canvas = document.createElement('canvas');
        canvas.width = rawWidth;
        canvas.height = rawHeight;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(rawWidth, rawHeight);

        for(let i = 0; i < heightData.length; i++) {
            const gray = Math.round(heightData[i]);
            imgData.data[i * 4] = gray;
            imgData.data[i * 4 + 1] = gray;
            imgData.data[i * 4 + 2] = gray;
            imgData.data[i * 4 + 3] = 255;
        }

        ctx.putImageData(imgData, 0, 0);
        return canvas.toDataURL('image/png');
    }

            imgData.data[i * 4 + 2] = gray;
