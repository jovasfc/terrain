    }

    // 生成等高线路径（使用追踪算法生成连续曲线）
    function generateContourPaths(targetLevel, segs, pos, minX, minZ, width, height, svgWidth, svgHeight) {
        const paths = [];
        const grid = new Array(segs + 1).fill(null).map(() => new Array(segs + 1).fill(0));

        // 填充网格高度值
        for(let y = 0; y <= segs; y++) {
            for(let x = 0; x <= segs; x++) {
                const idx = y * (segs + 1) + x;
                grid[y][x] = pos[idx * 3 + 1];
            }
        }

        const cellSizeX = width / segs;
        const cellSizeZ = height / segs;

        // 转换为SVG坐标
        const toSvg = (p) => ({
            x: ((p.x - minX) / width) * svgWidth,
            y: svgHeight - ((p.z - minZ) / height) * svgHeight
        });

        // 插值函数
        const interpolate = (v1, v2) => {
            if(Math.abs(v2 - v1) < 0.0001) return 0.5;
            return (targetLevel - v1) / (v2 - v1);
        };

        // 获取单元格的边交叉点
        function getEdgeCrossing(x, y, edge) {
            const tl = grid[y][x];
            const tr = grid[y][x + 1];
            const br = grid[y + 1][x + 1];
            const bl = grid[y + 1][x];
            const cellMinX = minX + x * cellSizeX;
            const cellMinZ = minZ + y * cellSizeZ;

            switch(edge) {
                case 0: // 底边 (bottom)
                    const t = interpolate(bl, br);
                    return { x: cellMinX + t * cellSizeX, z: cellMinZ, edge: 'bottom', cellX: x, cellY: y };
                case 1: // 右边 (right)
                    const r = interpolate(br, tr);
                    return { x: cellMinX + cellSizeX, z: cellMinZ + r * cellSizeZ, edge: 'right', cellX: x, cellY: y };
                case 2: // 顶边 (top)
                    const top = interpolate(tl, tr);
                    return { x: cellMinX + top * cellSizeX, z: cellMinZ + cellSizeZ, edge: 'top', cellX: x, cellY: y };
                case 3: // 左边 (left)
                    const l = interpolate(bl, tl);
                    return { x: cellMinX, z: cellMinZ + l * cellSizeZ, edge: 'left', cellX: x, cellY: y };
            }
            return null;
        }

        // 获取单元格的Marching Squares case index
        function getCaseIndex(x, y) {
            const tl = grid[y][x];
            const tr = grid[y][x + 1];
            const br = grid[y + 1][x + 1];
            const bl = grid[y + 1][x];
            let caseIndex = 0;
            if(tl > targetLevel) caseIndex |= 8;
            if(tr > targetLevel) caseIndex |= 4;
            if(br > targetLevel) caseIndex |= 2;
            if(bl > targetLevel) caseIndex |= 1;
            return caseIndex;
        }

        // 获取单元格的起始边和结束边
        function getCellEdges(caseIndex) {
            const edgePairs = {
                1: [[0, 3]], 2: [[0, 1]], 3: [[1, 3]], 4: [[1, 2]],
                5: [[0, 3], [1, 2]], 6: [[0, 2]], 7: [[2, 3]], 8: [[2, 3]],
                9: [[0, 2]], 10: [[0, 1], [2, 3]], 11: [[1, 2]], 12: [[1, 3]],
                13: [[0, 1]], 14: [[0, 3]]
            };
            return edgePairs[caseIndex] || [];
        }

        // 获取相邻单元格
        function getNeighborCell(cellX, cellY, edge) {
            switch(edge) {
                case 'bottom': return { x: cellX, y: cellY - 1, enterEdge: 'top' };
                case 'top': return { x: cellX, y: cellY + 1, enterEdge: 'bottom' };
                case 'left': return { x: cellX - 1, y: cellY, enterEdge: 'right' };
                case 'right': return { x: cellX + 1, y: cellY, enterEdge: 'left' };
            }
            return null;
        }

        // 追踪单条等高线
        function traceContour(startX, startY, startEdge, visited) {
            const points = [];
            let currentX = startX;
            let currentY = startY;
            let enterEdge = startEdge;
            let iterations = 0;
            const maxIterations = segs * segs * 2;

            while(iterations < maxIterations) {
                const key = `${currentX},${currentY},${enterEdge}`;
                if(visited.has(key)) break;
                visited.add(key);

                const caseIndex = getCaseIndex(currentX, currentY);
                if(caseIndex === 0 || caseIndex === 15) break;

                const edges = getCellEdges(caseIndex);
                let exitEdge = null;

                for(const [e1, e2] of edges) {
                    const edge1Name = ['bottom', 'right', 'top', 'left'][e1];
                    const edge2Name = ['bottom', 'right', 'top', 'left'][e2];
                    if(edge1Name === enterEdge) {
                        exitEdge = edge2Name;
                        break;
                    } else if(edge2Name === enterEdge) {
                        exitEdge = edge1Name;
                        break;
                    }
                }

                if(!exitEdge) break;

                // 获取出口点
                const exitPoint = getEdgeCrossing(currentX, currentY, ['bottom', 'right', 'top', 'left'].indexOf(exitEdge));
                points.push(exitPoint);

                // 移动到相邻单元格
                const neighbor = getNeighborCell(currentX, currentY, exitEdge);
                if(!neighbor || neighbor.x < 0 || neighbor.x >= segs || neighbor.y < 0 || neighbor.y >= segs) {
                    break;
                }

                currentX = neighbor.x;
                currentY = neighbor.y;
                enterEdge = neighbor.enterEdge;
                iterations++;
            }

            return points;
        }

        // 查找所有等高线起点并追踪
        const visited = new Set();
        const allPaths = [];

        // 从边界开始查找起点
        for(let y = 0; y < segs; y++) {
            for(let x = 0; x < segs; x++) {
                const caseIndex = getCaseIndex(x, y);
                if(caseIndex === 0 || caseIndex === 15) continue;

                const edges = getCellEdges(caseIndex);
                for(const [e1, e2] of edges) {
                    const edgeNames = ['bottom', 'right', 'top', 'left'];
                    const startEdge = edgeNames[e1];
                    const key = `${x},${y},${startEdge}`;

                    if(!visited.has(key)) {
                        // 获取起始点
                        const startPoint = getEdgeCrossing(x, y, e1);
                        const points = traceContour(x, y, startEdge, visited);

                        if(points.length > 0) {
                            // 构建SVG路径
                            let pathD = `M${toSvg(startPoint).x.toFixed(2)},${toSvg(startPoint).y.toFixed(2)}`;
                            for(const pt of points) {
                                pathD += ` L${toSvg(pt).x.toFixed(2)},${toSvg(pt).y.toFixed(2)}`;
                            }
                            allPaths.push({ d: pathD, points: [startPoint, ...points] });
                        }
                    }
                }
            }
        }

        return allPaths;
    }

    // 从heightData生成等高线路径（直接从dem.png数据）
    function generateContourPathsFromHeightData(targetLevel, gridWidth, gridHeight, heightData, svgWidth, svgHeight) {
        const paths = [];

        // 创建网格
        const grid = new Array(gridHeight).fill(null).map(() => new Array(gridWidth).fill(0));
        for(let y = 0; y < gridHeight; y++) {
            for(let x = 0; x < gridWidth; x++) {
                grid[y][x] = heightData[y * gridWidth + x];
            }
        }

        // 转换为SVG坐标
        const toSvg = (px, py) => ({
            x: (px / (gridWidth - 1)) * svgWidth,
            y: svgHeight - (py / (gridHeight - 1)) * svgHeight
        });

        // 插值函数
        const interpolate = (v1, v2) => {
            if(Math.abs(v2 - v1) < 0.0001) return 0.5;
            return (targetLevel - v1) / (v2 - v1);
        };

        // 获取单元格的边交叉点
        function getEdgeCrossing(x, y, edge) {
            const tl = grid[y][x];
            const tr = grid[y][x + 1];
            const br = grid[y + 1][x + 1];
            const bl = grid[y + 1][x];

            switch(edge) {
                case 0: // 底边
                    const t = interpolate(bl, br);
                    return { x: x + t, y: y, edge: 'bottom', cellX: x, cellY: y };
                case 1: // 右边
                    const r = interpolate(br, tr);
                    return { x: x + 1, y: y + r, edge: 'right', cellX: x, cellY: y };
                case 2: // 顶边
                    const top = interpolate(tl, tr);
                    return { x: x + top, y: y + 1, edge: 'top', cellX: x, cellY: y };
                case 3: // 左边
                    const l = interpolate(bl, tl);
                    return { x: x, y: y + l, edge: 'left', cellX: x, cellY: y };
            }
            return null;
        }

        // 获取单元格的Marching Squares case index
        function getCaseIndex(x, y) {
            const tl = grid[y][x];
            const tr = grid[y][x + 1];
            const br = grid[y + 1][x + 1];
            const bl = grid[y + 1][x];
            let caseIndex = 0;
            if(tl > targetLevel) caseIndex |= 8;
            if(tr > targetLevel) caseIndex |= 4;
            if(br > targetLevel) caseIndex |= 2;
            if(bl > targetLevel) caseIndex |= 1;
            return caseIndex;
        }

        // 获取单元格的起始边和结束边
        function getCellEdges(caseIndex) {
            const edgePairs = {
                1: [[0, 3]], 2: [[0, 1]], 3: [[1, 3]], 4: [[1, 2]],
                5: [[0, 3], [1, 2]], 6: [[0, 2]], 7: [[2, 3]], 8: [[2, 3]],
                9: [[0, 2]], 10: [[0, 1], [2, 3]], 11: [[1, 2]], 12: [[1, 3]],
                13: [[0, 1]], 14: [[0, 3]]
            };
            return edgePairs[caseIndex] || [];
        }

        // 获取相邻单元格
        function getNeighborCell(cellX, cellY, edge) {
            switch(edge) {
                case 'bottom': return { x: cellX, y: cellY - 1, enterEdge: 'top' };
                case 'top': return { x: cellX, y: cellY + 1, enterEdge: 'bottom' };
                case 'left': return { x: cellX - 1, y: cellY, enterEdge: 'right' };
                case 'right': return { x: cellX + 1, y: cellY, enterEdge: 'left' };
            }
            return null;
        }

        // 追踪单条等高线
        function traceContour(startX, startY, startEdge, visited) {
            const points = [];
            let currentX = startX;
            let currentY = startY;
            let enterEdge = startEdge;
            let iterations = 0;
            const maxIterations = gridWidth * gridHeight * 2;

            while(iterations < maxIterations) {
                const key = `${currentX},${currentY},${enterEdge}`;
                if(visited.has(key)) break;
                visited.add(key);

                const caseIndex = getCaseIndex(currentX, currentY);
                if(caseIndex === 0 || caseIndex === 15) break;

                const edges = getCellEdges(caseIndex);
                let exitEdge = null;

                for(const [e1, e2] of edges) {
                    const edge1Name = ['bottom', 'right', 'top', 'left'][e1];
                    const edge2Name = ['bottom', 'right', 'top', 'left'][e2];
                    if(edge1Name === enterEdge) {
                        exitEdge = edge2Name;
                        break;
                    } else if(edge2Name === enterEdge) {
                        exitEdge = edge1Name;
                        break;
                    }
                }

                if(!exitEdge) break;

                // 获取出口点
                const exitPoint = getEdgeCrossing(currentX, currentY, ['bottom', 'right', 'top', 'left'].indexOf(exitEdge));
                points.push(exitPoint);

                // 移动到相邻单元格
                const neighbor = getNeighborCell(currentX, currentY, exitEdge);
                if(!neighbor || neighbor.x < 0 || neighbor.x >= gridWidth - 1 || neighbor.y < 0 || neighbor.y >= gridHeight - 1) {
                    break;
                }

                currentX = neighbor.x;
                currentY = neighbor.y;
                enterEdge = neighbor.enterEdge;
                iterations++;
            }

            return points;
        }

        // 查找所有等高线起点并追踪
        const visited = new Set();
        const allPaths = [];

        // 遍历所有单元格
        for(let y = 0; y < gridHeight - 1; y++) {
            for(let x = 0; x < gridWidth - 1; x++) {
                const caseIndex = getCaseIndex(x, y);
                if(caseIndex === 0 || caseIndex === 15) continue;

                const edges = getCellEdges(caseIndex);
                for(const [e1, e2] of edges) {
                    const edgeNames = ['bottom', 'right', 'top', 'left'];
                    const startEdge = edgeNames[e1];
                    const key = `${x},${y},${startEdge}`;

                    if(!visited.has(key)) {
                        // 获取起始点
                        const startPoint = getEdgeCrossing(x, y, e1);
                        const points = traceContour(x, y, startEdge, visited);

                        if(points.length > 0) {
                            // 构建SVG路径
                            const svgStart = toSvg(startPoint.x, startPoint.y);
                            let pathD = `M${svgStart.x.toFixed(2)},${svgStart.y.toFixed(2)}`;
                            for(const pt of points) {
                                const svgPt = toSvg(pt.x, pt.y);
                                pathD += ` L${svgPt.x.toFixed(2)},${svgPt.y.toFixed(2)}`;
                            }
                            allPaths.push({ d: pathD, points: [startPoint, ...points] });
                        }
                    }
                }
            }
        }

        return allPaths;
    }

    // 导出等高线（参考gd copy.html）
    async function exportContours() {
        if(!heightData) {
            alert('请先导入高度图');
            return;
        }

        showImportStatus('正在导出等高线...');

        const zip = new JSZip();
        const now = new Date();
        const timestamp = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;

        // 获取高程范围
        let minHeight = Infinity, maxHeight = -Infinity;
        for(let i = 0; i < heightData.length; i++) {
            minHeight = Math.min(minHeight, heightData[i]);
            maxHeight = Math.max(maxHeight, heightData[i]);
        }

        // 计算等高距（参考gd copy.html的自动计算逻辑）
        const diff = maxHeight - minHeight;
        let ideal = diff / 12;
        const magnitude = Math.pow(10, Math.floor(Math.log10(ideal)));
        const res = ideal / magnitude;
        let step;
        if (res < 1.5) step = 1 * magnitude;
        else if (res < 3.5) step = 2 * magnitude;
        else if (res < 7.5) step = 5 * magnitude;
        else step = 10 * magnitude;

        // 设置导出分辨率（提高到1600px宽）
        const exportWidth = 1600;
        const aspectRatio = rawHeight / rawWidth;
        const exportHeight = Math.round(exportWidth * aspectRatio);

        // 创建高分辨率的数据
        const { data, width, height } = { data: heightData, width: rawWidth, height: rawHeight };

        // 1. 先生成等高线SVG（使用原始尺寸和坐标）
        let svgPaths = "";
        let svgTexts = "";

        for (let v = Math.ceil(minHeight / step) * step; v <= maxHeight; v += step) {
            const targetGray = ((v - minHeight) / (maxHeight - minHeight)) * 255;
            const segments = getContourSegments(data, width, height, targetGray);
            if (segments.length === 0) continue;

            const isMajor = v % (step * 5) === 0;
            const color = isMajor ? '#52525b' : '#a1a1aa';
            const weight = isMajor ? 0.8 : 0.4;
            
            let pathData = "";
            segments.forEach((seg, i) => {
                const [p1, p2] = seg;
                pathData += `M${p1[0].toFixed(1)},${p1[1].toFixed(1)} L${p2[0].toFixed(1)},${p2[1].toFixed(1)} `;
                
                if (isMajor && i === Math.floor(segments.length / 2)) {
                    svgTexts += `<text x="${p1[0]}" y="${p1[1]}" font-family="sans-serif" font-size="9" fill="#3f3f46" text-anchor="middle">${v}</text>`;
                }
            });
            svgPaths += `<path d="${pathData}" stroke="${color}" stroke-width="${weight}" fill="none"/>`;
        }

        const svgFull = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="${width}" height="${height}" fill="white"/>${svgPaths}${svgTexts}</svg>`;
        zip.file('等高线.svg', svgFull);

        // 2. 从SVG转换为高分辨率PNG
        const img = new Image();
        const svgBlob = new Blob([svgFull], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        
        const canvas = document.createElement('canvas');
        canvas.width = exportWidth;
        canvas.height = exportHeight;
        const ctx = canvas.getContext('2d');
        
        await new Promise((resolve) => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0, exportWidth, exportHeight);
                URL.revokeObjectURL(url);
                resolve();
            };
            img.onerror = (e) => {
                console.error('SVG加载失败:', e);
                resolve();
            };
            img.src = url;
        });

        const pngBase64 = canvas.toDataURL('image/png').split(',')[1];
        zip.file('等高线.png', pngBase64, { base64: true });

        // 3. 生成DEM（高分辨率）
        const demCanvas = document.createElement('canvas');
        demCanvas.width = exportWidth;
        demCanvas.height = exportHeight;
        const demCtx = demCanvas.getContext('2d');
        const imgData = demCtx.createImageData(exportWidth, exportHeight);

        // 使用双线性插值放大DEM
        for(let y = 0; y < exportHeight; y++) {
            for(let x = 0; x < exportWidth; x++) {
                const srcX = (x / exportWidth) * (width - 1);
                const srcY = (y / exportHeight) * (height - 1);
                const x0 = Math.floor(srcX);
                const y0 = Math.floor(srcY);
                const x1 = Math.min(x0 + 1, width - 1);
                const y1 = Math.min(y0 + 1, height - 1);
                const fx = srcX - x0;
                const fy = srcY - y0;

                const v00 = heightData[y0 * width + x0];
                const v10 = heightData[y0 * width + x1];
                const v01 = heightData[y1 * width + x0];
                const v11 = heightData[y1 * width + x1];

                const v0 = v00 * (1 - fx) + v10 * fx;
                const v1 = v01 * (1 - fx) + v11 * fx;
                const v = v0 * (1 - fy) + v1 * fy;

                const idx = (y * exportWidth + x) * 4;
                const gray = Math.round(v);
                imgData.data[idx] = gray;
                imgData.data[idx + 1] = gray;
                imgData.data[idx + 2] = gray;
                imgData.data[idx + 3] = 255;
            }
        }

        demCtx.putImageData(imgData, 0, 0);
        const demBase64 = demCanvas.toDataURL('image/png').split(',')[1];
        zip.file('dem.png', demBase64, { base64: true });

        // 4. 生成ZIP并下载
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `等高线${timestamp}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);

        showImportStatus('等高线导出完成！');
    }

        canvas.width = exportWidth + legendWidth;
        canvas.height = finalCanvasHeight;
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        
        await new Promise((resolve) => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
                resolve();
            };
            img.src = url;
        });

        const pngBase64 = canvas.toDataURL('image/png').split(',')[1];
        zip.file('分层设色.png', pngBase64, { base64: true });

        // 3. 生成ZIP并下载
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `分层设色${timestamp}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);

        showImportStatus('分层设色地形图导出完成！');
    }

    // Marching Squares算法（参考gd copy.html）
    function getContourSegments(data, width, height, level) {
        const segments = [];
        const lerp = (p1, p2, v1, v2, target) => p1 + (p2 - p1) * (target - v1) / (v2 - v1);
        
        for (let y = 0; y < height - 1; y++) {
            for (let x = 0; x < width - 1; x++) {
                const idx = y * width + x;
                const v0 = data[idx], v1 = data[idx + 1], v2 = data[idx + width + 1], v3 = data[idx + width];
                let caseIndex = (v0>=level?8:0)|(v1>=level?4:0)|(v2>=level?2:0)|(v3>=level?1:0);
                
                const t = [lerp(x,x+1,v0,v1,level),y];
                const r = [x+1,lerp(y,y+1,v1,v2,level)];
                const b = [lerp(x,x+1,v3,v2,level),y+1];
                const l = [x,lerp(y,y+1,v0,v3,level)];
                
                switch(caseIndex){
                    case 1:case 14:segments.push([l,b]);break;
                    case 2:case 13:segments.push([b,r]);break;
                    case 3:case 12:segments.push([l,r]);break;
                    case 4:case 11:segments.push([t,r]);break;
                    case 5:segments.push([t,l],[b,r]);break;
                    case 6:case 9:segments.push([t,b]);break;
                    case 7:case 8:segments.push([t,l]);break;
                    case 10:segments.push([t,r],[b,l]);break;
                }
            }
        }
        return segments;
    }

    function updateHeight() {
        if(!terrain || !heightData) return;
        const sliderValue = parseFloat(this.value);
        // 对数变换：将0-100映射到0.01-30
        const val = logarithmicTransform(sliderValue, 0.01, 30);
        document.getElementById('height-val').innerText = val.toFixed(2) + 'x';
        
        // 记录等高线是否开启
        const contourEnabled = document.getElementById('contour-toggle').checked;
        
        // 重新构建地形以更新基座和方位标记，跳过等高距计算
        const canvas = document.createElement('canvas');
        canvas.width = rawWidth;
        canvas.height = rawHeight;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(rawWidth, rawHeight);
        for (let i = 0; i < heightData.length; i++) {
            const v = Math.floor(heightData[i]);
            imgData.data[i * 4] = v;
            imgData.data[i * 4 + 1] = v;
            imgData.data[i * 4 + 2] = v;
            imgData.data[i * 4 + 3] = 255;
        }
        ctx.putImageData(imgData, 0, 0);
        buildTerrain(canvas, true);  // 传入true跳过等高距计算
        
        // 如果等高线是开启的，刷新等高线显示
        if (contourEnabled) {
            updateUniforms();
        }
    }

    function updateDetail() {
        if(!heightData) return;
        const canvas = document.createElement('canvas');
        canvas.width = rawWidth;
        canvas.height = rawHeight;
        const ctx = canvas.getContext('2d');
        const img = ctx.createImageData(rawWidth, rawHeight);
        for(let i=0; i<img.data.length; i+=4) {
            img.data[i] = heightData[i/4];
            img.data[i+1] = heightData[i/4];
            img.data[i+2] = heightData[i/4];
            img.data[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);
        buildTerrain(canvas);
    }

    // 对数变换函数：将滑块值(0-100)映射到实际值(min-max)
    function logarithmicTransform(sliderValue, minVal, maxVal) {
        if (sliderValue <= 0) return minVal;
        if (sliderValue >= 100) return maxVal;
        // 使用对数变换，让小的值更容易调节
        const t = sliderValue / 100;
        const logMin = Math.log(minVal);
        const logMax = Math.log(maxVal);
        const logVal = logMin + t * (logMax - logMin);
        return Math.exp(logVal);
    }

    // 反向对数变换：将实际值映射回滑块值(0-100)
    function inverseLogarithmicTransform(actualValue, minVal, maxVal) {
        if (actualValue <= minVal) return 0;
        if (actualValue >= maxVal) return 100;
        const logMin = Math.log(minVal);
        const logMax = Math.log(maxVal);
        const logVal = Math.log(actualValue);
        const t = (logVal - logMin) / (logMax - logMin);
        return t * 100;
    }

    function calculateSunPosition() {
        const latitude = parseFloat(document.getElementById('latitude').value);
        const dateStr = document.getElementById('date-input').value;
        
        if (!dateStr) {
            alert('请先设置日期');
            return;
        }

        const date = new Date(dateStr);
        const dayOfYear = getDayOfYear(date);
        
        const declination = 23.45 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
        const hourAngle = 15 * 12;
        
        const sinElevation = Math.sin(latitude * Math.PI / 180) * Math.sin(declination * Math.PI / 180) + 
                            Math.cos(latitude * Math.PI / 180) * Math.cos(declination * Math.PI / 180) * Math.cos(hourAngle * Math.PI / 180);
        const elevation = Math.asin(sinElevation) * 180 / Math.PI;
        
        const sinAzimuth = Math.sin(hourAngle * Math.PI / 180);
        const cosAzimuth = Math.cos(hourAngle * Math.PI / 180) * Math.sin(latitude * Math.PI / 180) - 
                           Math.tan(declination * Math.PI / 180) * Math.cos(latitude * Math.PI / 180);
        const azimuth = Math.atan2(sinAzimuth, cosAzimuth) * 180 / Math.PI;
        const normalizedAzimuth = (azimuth + 360) % 360;
        
        document.getElementById('sun-elevation').value = Math.max(0, Math.min(90, elevation)).toFixed(0);
        document.getElementById('sun-elevation-val').innerText = Math.max(0, Math.min(90, elevation)).toFixed(0) + '°';
        document.getElementById('sun-azimuth').value = normalizedAzimuth.toFixed(0);
        document.getElementById('sun-azimuth-val').innerText = normalizedAzimuth.toFixed(0) + '°';
        
        updateSunPosition(Math.max(0, Math.min(90, elevation)), normalizedAzimuth);
    }

    function getDayOfYear(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        const oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay);
    }

    function calculateSunriseSunset(latitude, dateStr) {
        const date = new Date(dateStr);
        const dayOfYear = getDayOfYear(date);
        
        const declination = 23.45 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
        const latRad = latitude * Math.PI / 180;
        const decRad = declination * Math.PI / 180;
        
        const cosHourAngle = -Math.tan(latRad) * Math.tan(decRad);
        
        if (cosHourAngle > 1) {
            return { sunrise: null, sunset: null };
        }
        if (cosHourAngle < -1) {
            return { sunrise: null, sunset: null };
        }
        
        const hourAngleRad = Math.acos(cosHourAngle);
        const hourAngleDeg = hourAngleRad * 180 / Math.PI;
        
        const sunriseHour = 12 - hourAngleDeg / 15;
        const sunsetHour = 12 + hourAngleDeg / 15;
        
        return {
            sunrise: formatTime(sunriseHour),
            sunset: formatTime(sunsetHour)
        };
    }

    function formatTime(decimalHours) {
        const hours = Math.floor(decimalHours);
        const minutes = Math.round((decimalHours - hours) * 60);
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function calculateSunPositionByTime(timeMinutes, latitude, dateStr) {
        const date = new Date(dateStr);
        const dayOfYear = getDayOfYear(date);
        
        const declination = 23.45 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
        const latRad = latitude * Math.PI / 180;
        const decRad = declination * Math.PI / 180;
        
        const hourAngle = (timeMinutes / 60 - 12) * 15;
        const hourAngleRad = hourAngle * Math.PI / 180;
        
        const sinElevation = Math.sin(latRad) * Math.sin(decRad) + 
                            Math.cos(latRad) * Math.cos(decRad) * Math.cos(hourAngleRad);
        const elevation = Math.asin(sinElevation) * 180 / Math.PI;
        
        const sinAzimuth = Math.sin(hourAngleRad);
        const cosAzimuth = Math.cos(hourAngleRad) * Math.sin(latRad) - 
                           Math.tan(decRad) * Math.cos(latRad);
        const azimuth = Math.atan2(sinAzimuth, cosAzimuth) * 180 / Math.PI;
        const normalizedAzimuth = (azimuth + 360) % 360;
        
        return {
            elevation: Math.max(0, Math.min(90, elevation)),
            azimuth: normalizedAzimuth
        };
    }

    // 显示纹理切换控件
    function showTextureSwitcher() {
        const switcher = document.getElementById('texture-switcher');
        const buttons = switcher.querySelectorAll('.texture-btn');
        
        // 只显示可用的纹理按钮
        buttons.forEach(btn => {
            const textureType = btn.getAttribute('data-texture');
            if (window.availableTextures[textureType]) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        });
        
        // 设置第一个可用的纹理按钮为active状态
        const textureKeys = Object.keys(window.availableTextures);
        if (textureKeys.length > 0) {
            const firstTextureKey = textureKeys[0];
            buttons.forEach(btn => {
                if (btn.getAttribute('data-texture') === firstTextureKey) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        switcher.classList.remove('hidden');
        
        // 绑定点击事件
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const textureType = btn.getAttribute('data-texture');
                switchTexture(textureType);
                
                // 更新按钮状态
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }

    // 切换纹理
    function switchTexture(textureType) {
        const textureFile = window.availableTextures[textureType];
        if (!textureFile) return;
        
        try {
            const url = URL.createObjectURL(textureFile);
            const loader = new THREE.TextureLoader();
            loader.load(url, (tex) => {
                tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                customTexture = tex;
                rebuildMaterial();
                URL.revokeObjectURL(url);
            });
        } catch (err) {
            console.error('加载纹理失败:', err);
        }
    }

    function setDrawingMode(mode) {
        if (drawingMode === mode) {
            drawingMode = null;
            document.querySelectorAll('#draw-point, #draw-line, #draw-polygon, #draw-arrow').forEach(btn => btn.classList.remove('active'));
        } else {
            drawingMode = mode;
            document.querySelectorAll('#draw-point, #draw-line, #draw-polygon, #draw-arrow').forEach(btn => btn.classList.remove('active'));
            document.getElementById('draw-' + mode).classList.add('active');
        }
        isDrawing = false;
        drawingPoints = [];
        if (currentDrawing) {
            drawingsGroup.remove(currentDrawing);
            currentDrawing = null;
        }
        if (previewLine) {
            drawingsGroup.remove(previewLine);
            previewLine = null;
        }
        previewPointMarkers.forEach(marker => {
            drawingsGroup.remove(marker);
        });
        previewPointMarkers = [];

            drawingsGroup.remove(tempPreviewMarker);

        }

    function clearDrawings() {

            drawingsGroup.remove(drawingsGroup.children[0]);

        drawingPoints = [];
        currentDrawing = null;
    }

    function onDrawingMouseDown(event) {
        if (!drawingMode) return;
        isDrawing = true;
    }

    function onDrawingMouseMove(event) {
        if (!drawingMode || !isDrawing) return;
        
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(terrain);
        
        if (intersects.length > 0) {
            const point = intersects[0].point;
            
            if (drawingMode === 'point') {
                if (currentDrawing) {
                    drawingsGroup.remove(currentDrawing);
                }
                currentDrawing = createPointMarker(point);
                drawingsGroup.add(currentDrawing);
            } else if (drawingMode === 'line' && drawingPoints.length > 0) {
                if (previewLine) {
                    drawingsGroup.remove(previewLine);
                }
                const tempPoints = [...drawingPoints, point];
                previewLine = createPolyline(tempPoints);
                drawingsGroup.add(previewLine);
                
                if (tempPreviewMarker) {
                    drawingsGroup.remove(tempPreviewMarker);
                }
                tempPreviewMarker = createPreviewPointMarker(point);
                drawingsGroup.add(tempPreviewMarker);
            } else if (drawingMode === 'polygon' && drawingPoints.length > 0) {
                if (previewLine) {
                    drawingsGroup.remove(previewLine);
                }
                const tempPoints = [...drawingPoints, point];
                previewLine = createPolyline(tempPoints);
                drawingsGroup.add(previewLine);
                
                if (tempPreviewMarker) {
                    drawingsGroup.remove(tempPreviewMarker);
                }
                tempPreviewMarker = createPreviewPointMarker(point);
                drawingsGroup.add(tempPreviewMarker);
            } else if (drawingMode === 'arrow' && drawingPoints.length === 1) {
                if (previewLine) {
                    drawingsGroup.remove(previewLine);
                }
                const tempPoints = [drawingPoints[0], point];
                previewLine = createArrow(tempPoints[0], tempPoints[1]);
                drawingsGroup.add(previewLine);
                
                if (tempPreviewMarker) {
                    drawingsGroup.remove(tempPreviewMarker);
                }
                tempPreviewMarker = createPreviewPointMarker(point);
                drawingsGroup.add(tempPreviewMarker);
            }
        }
    }

    function onDrawingMouseUp(event) {
        if (!drawingMode) return;
        isDrawing = false;
    }

    function onDrawingClick(event) {
        if (!drawingMode) return;
        
        const currentTime = Date.now();
        const isDoubleClick = (currentTime - lastClickTime) < 300;
        lastClickTime = currentTime;
        
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(terrain);
        
        if (intersects.length > 0) {
            const point = intersects[0].point;
            
            if (drawingMode === 'point') {
                if (currentDrawing) {
                    drawingsGroup.remove(currentDrawing);
                }
                currentDrawing = createPointMarker(point);
                drawingsGroup.add(currentDrawing);
                currentDrawing = null;
            } else if (drawingMode === 'line') {
                if (isDoubleClick && drawingPoints.length >= 2) {
                    const polyline = createPolyline(drawingPoints);
                    drawingsGroup.add(polyline);
                    
                    previewPointMarkers.forEach(marker => {
                        drawingsGroup.remove(marker);
                    });
                    previewPointMarkers = [];
                    
                    if (previewLine) {
                        drawingsGroup.remove(previewLine);
                        previewLine = null;
                    }
                    
                    drawingPoints = [];
                    previewPoints = [];
                } else {
                    drawingPoints.push(point);
                    
                    if (previewLine) {
                        drawingsGroup.remove(previewLine);
                        previewLine = null;
                    }
                    
                    if (tempPreviewMarker) {
                        drawingsGroup.remove(tempPreviewMarker);
                        tempPreviewMarker = null;
                    }
                    
                    previewPoints.push(point);
                    
                    const pointMarker = createPreviewPointMarker(point);
                    drawingsGroup.add(pointMarker);
                    previewPointMarkers.push(pointMarker);
                    
                    if (drawingPoints.length >= 2) {
                        previewLine = createPolyline(drawingPoints);
                        drawingsGroup.add(previewLine);
                    }
                }
            } else if (drawingMode === 'polygon') {
                if (isDoubleClick && drawingPoints.length >= 3) {
                    const polygon = createPolygon(drawingPoints);
                    drawingsGroup.add(polygon);
                    
                    previewPointMarkers.forEach(marker => {
                        drawingsGroup.remove(marker);
                    });
                    previewPointMarkers = [];
                    
                    if (previewLine) {
                        drawingsGroup.remove(previewLine);
                        previewLine = null;
                    }
                    
                    drawingPoints = [];
                    previewPoints = [];
                } else if (!isDoubleClick) {
                    drawingPoints.push(point);
                    
                    if (previewLine) {
                        drawingsGroup.remove(previewLine);
                        previewLine = null;
                    }
                    
                    if (tempPreviewMarker) {
                        drawingsGroup.remove(tempPreviewMarker);
                        tempPreviewMarker = null;
                    }
                    
                    previewPoints.push(point);
                    
                    const pointMarker = createPreviewPointMarker(point);
                    drawingsGroup.add(pointMarker);
                    previewPointMarkers.push(pointMarker);
                    
                    if (drawingPoints.length >= 2) {
                        previewLine = createPolyline(drawingPoints);
                        drawingsGroup.add(previewLine);
                    }
                }
            } else if (drawingMode === 'arrow') {
                drawingPoints.push(point);
                
                if (tempPreviewMarker) {
                    drawingsGroup.remove(tempPreviewMarker);
                    tempPreviewMarker = null;
                }
                
                if (previewLine) {
                    drawingsGroup.remove(previewLine);
                    previewLine = null;
                }
                
                if (drawingPoints.length === 2) {
                    const arrow = createArrow(drawingPoints[0], drawingPoints[1]);
                    drawingsGroup.add(arrow);
                    
                    previewPointMarkers.forEach(marker => {
                        drawingsGroup.remove(marker);
                    });
                    previewPointMarkers = [];
                    
                    drawingPoints = [];
                    previewPoints = [];
                } else {
                    previewPoints.push(point);
                    
                    const pointMarker = createPreviewPointMarker(point);
                    drawingsGroup.add(pointMarker);
                    previewPointMarkers.push(pointMarker);
                }
            }
        }
    }

    function createPreviewPointMarker(position) {
        const geometry = new THREE.SphereGeometry(0.8, 16, 16);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00ff00,
            depthTest: false,
            depthWrite: false
        });
        const marker = new THREE.Mesh(geometry, material);
        marker.position.copy(position);
        marker.position.y += 0.8;
        marker.renderOrder = 2;
        return marker;
    }

    function createPointMarker(position) {
        const group = new THREE.Group();
        
        const pinHeight = 6;
        const pinHeadRadius = 2.5;
        
        const pinBodyGeometry = new THREE.CylinderGeometry(0.8, 0.3, pinHeight, 16);
        const pinBodyMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xff0000,
            depthTest: false,
            depthWrite: false
        });
        const pinBody = new THREE.Mesh(pinBodyGeometry, pinBodyMaterial);
        pinBody.position.copy(position);
        pinBody.position.y += pinHeight / 2 + 0.5;
        pinBody.renderOrder = 2;
        
        const pinHeadGeometry = new THREE.SphereGeometry(pinHeadRadius, 32, 32);
        const pinHeadMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xff0000,
            depthTest: false,
            depthWrite: false
        });
        const pinHead = new THREE.Mesh(pinHeadGeometry, pinHeadMaterial);
        pinHead.position.copy(position);
        pinHead.position.y += pinHeight + 0.5;
        pinHead.renderOrder = 2;
        
        const pinCenterGeometry = new THREE.SphereGeometry(1.2, 32, 32);
        const pinCenterMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff,
            depthTest: false,
            depthWrite: false
        });
        const pinCenter = new THREE.Mesh(pinCenterGeometry, pinCenterMaterial);
        pinCenter.position.copy(position);
        pinCenter.position.y += pinHeight + 0.5;
        pinCenter.renderOrder = 2;
        
        const shadowGeometry = new THREE.CircleGeometry(pinHeadRadius * 0.8, 32);
        const shadowMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x000000,
            transparent: true,
            opacity: 0.3,
            depthTest: false,
            depthWrite: false
        });
        const shadow = new THREE.Mesh(shadowGeometry, shadowMaterial);
        shadow.position.copy(position);
        shadow.rotation.x = -Math.PI / 2;
        shadow.position.y += 0.1;
        shadow.renderOrder = 2;
        
        group.add(pinBody);
        group.add(pinHead);
        group.add(pinCenter);
        group.add(shadow);
        
        return group;
    }

    function createPolygon(points) {
        if (points.length < 3) return null;
        
        const vertices = [];
        for (let i = 0; i < points.length; i++) {
            vertices.push(points[i].x, points[i].y + 0.5, points[i].z);
        }
        
        const indices = [];
        for (let i = 2; i < points.length; i++) {
            indices.push(0, i - 1, i);
        }
        
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        
        geometry.computeVertexNormals();
        
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff,
            transparent: true,
            opacity: 0.5,
            depthTest: false,
            depthWrite: false,
            side: THREE.DoubleSide
        });
        const polygon = new THREE.Mesh(geometry, material);
        polygon.renderOrder = 1;
        
        return polygon;
    }

    function createArrow(start, end) {
        const group = new THREE.Group();
        
        const direction = new THREE.Vector3().subVectors(end, start);
        const length = direction.length();
        const arrowWidth = 1.5;
        const arrowHeadLength = Math.min(length * 0.3, 8);
        const arrowHeadWidth = arrowWidth * 2.5;
        
        const arrowBodyShape = new THREE.Shape();
        arrowBodyShape.moveTo(-arrowWidth / 2, 0);
        arrowBodyShape.lineTo(-arrowWidth / 2, length - arrowHeadLength);
        arrowBodyShape.lineTo(-arrowHeadWidth / 2, length - arrowHeadLength);
        arrowBodyShape.lineTo(0, length);
        arrowBodyShape.lineTo(arrowHeadWidth / 2, length - arrowHeadLength);
        arrowBodyShape.lineTo(arrowWidth / 2, length - arrowHeadLength);
        arrowBodyShape.lineTo(arrowWidth / 2, 0);
        arrowBodyShape.lineTo(-arrowWidth / 2, 0);
        
        const geometry = new THREE.ShapeGeometry(arrowBodyShape);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xff00ff,
            depthTest: false,
            depthWrite: false,
            side: THREE.DoubleSide
        });
        const arrowMesh = new THREE.Mesh(geometry, material);
        
        arrowMesh.position.copy(start);
        arrowMesh.position.y += 0.5;
        
        arrowMesh.rotation.x = -Math.PI / 2;
        
        const angle = Math.atan2(direction.x, direction.z);
        arrowMesh.rotation.z = angle + Math.PI;
        
        arrowMesh.renderOrder = 2;
        
        group.add(arrowMesh);
        
        return group;
    }

    function createLine(start, end) {
        const path = new THREE.LineCurve3(start, end);
        const geometry = new THREE.TubeGeometry(path, 1, 0.8, 8, false);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xffff00,
            depthTest: false,
            depthWrite: false
        });
        const line = new THREE.Mesh(geometry, material);
        line.renderOrder = 2;
        return line;
    }

    function createPolyline(points) {
        if (points.length < 2) return null;
        
        const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.1);
        const geometry = new THREE.TubeGeometry(curve, points.length * 10, 0.4, 8, false);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xffff00,
            depthTest: false,
            depthWrite: false
        });
        const polyline = new THREE.Mesh(geometry, material);
        polyline.renderOrder = 2;
        return polyline;
    }

    function calculateLineLengths() {
        if (!window.terrainRealSize) {
            alert('请先加载地形数据');
            return;
        }

        const lines = drawingsGroup.children.filter(obj => 
            obj instanceof THREE.Mesh && 
            obj.geometry instanceof THREE.TubeGeometry
        );

        if (lines.length === 0) {
            alert('当前没有绘制的线');
            return;
        }

        const size = window.terrainRealSize;
        let totalLength = 0;
        let resultText = '线段长度:\n';

        lines.forEach((line, index) => {
            const geometry = line.geometry;
            const positions = geometry.attributes.position.array;
            const radialSegments = geometry.parameters.radialSegments || 8;
            const pointCount = positions.length / 3;

            let lineLength = 0;
            const centerLinePoints = [];

            for (let i = 0; i < pointCount; i += radialSegments) {
                const x = positions[i * 3];
                const y = positions[i * 3 + 1];
                const z = positions[i * 3 + 2];
                centerLinePoints.push(new THREE.Vector3(x, y, z));
            }

            for (let i = 0; i < centerLinePoints.length - 1; i++) {
                const p1 = centerLinePoints[i];
                const p2 = centerLinePoints[i + 1];

                const dx = Math.abs(p2.x - p1.x);
                const dz = Math.abs(p2.z - p1.z);

                const realDx = (dx / size.displayWidth) * size.realWidthMeters;
                const realDz = (dz / size.displayHeight) * size.realHeightMeters;

                const segmentLength = Math.sqrt(realDx * realDx + realDz * realDz);
                lineLength += segmentLength;
            }

            totalLength += lineLength;
            resultText += `线 ${index + 1}: ${lineLength.toFixed(2)} m\n`;
        });

        resultText += `\n总长度: ${totalLength.toFixed(2)} m`;
        alert(resultText);
    }

    function generateProfile() {
        if (!heightData || !terrain) {
            alert('请先加载地形数据');
            return;
        }

        const lines = drawingsGroup.children.filter(obj => 
            obj instanceof THREE.Mesh && 
            obj.geometry instanceof THREE.TubeGeometry
        );

        if (lines.length === 0) {
            alert('请先绘制一条线来生成剖面图');
            return;
        }

        const line = lines[lines.length - 1];
        const geometry = line.geometry;
        const positions = geometry.attributes.position.array;
        const radialSegments = geometry.parameters.radialSegments || 8;
        const pointCount = positions.length / 3;

        const centerLinePoints = [];
        for (let i = 0; i < pointCount; i += radialSegments) {
            const x = positions[i * 3];
            const y = positions[i * 3 + 1];
            const z = positions[i * 3 + 2];
            centerLinePoints.push(new THREE.Vector3(x, y, z));
        }

        const size = window.terrainRealSize || { displayWidth: terrainDimensions.width, displayHeight: terrainDimensions.height, realWidthMeters: terrainDimensions.width, realHeightMeters: terrainDimensions.height };
        
        const elevationRange = (window.demInfo && window.demInfo.elevationRange) ? window.demInfo.elevationRange : 50;
        const minElevation = (window.demInfo && window.demInfo.min !== undefined) ? window.demInfo.min : 0;

        let totalLineLength = 0;
        for (let i = 1; i < centerLinePoints.length; i++) {
            const p1 = centerLinePoints[i - 1];
            const p2 = centerLinePoints[i];
            const dx = Math.abs(p2.x - p1.x);
            const dz = Math.abs(p2.z - p1.z);
            const realDx = (dx / size.displayWidth) * size.realWidthMeters;
            const realDz = (dz / size.displayHeight) * size.realHeightMeters;
            totalLineLength += Math.sqrt(realDx * realDx + realDz * realDz);
        }

        const sampleCount = Math.max(100, Math.min(500, Math.floor(totalLineLength / 2)));
        
        const profileData = [];
        let totalDistance = 0;

        for (let i = 0; i < sampleCount; i++) {
            const t = i / (sampleCount - 1);
            
            let segmentIndex = 0;
            let segmentT = 0;
            let accumulatedLength = 0;
            
            for (let j = 1; j < centerLinePoints.length; j++) {
                const p1 = centerLinePoints[j - 1];
                const p2 = centerLinePoints[j];
                const dx = Math.abs(p2.x - p1.x);
                const dz = Math.abs(p2.z - p1.z);
                const realDx = (dx / size.displayWidth) * size.realWidthMeters;
                const realDz = (dz / size.displayHeight) * size.realHeightMeters;
                const segmentLength = Math.sqrt(realDx * realDx + realDz * realDz);
                
                if (accumulatedLength + segmentLength >= t * totalLineLength) {
                    segmentIndex = j - 1;
                    if (segmentLength > 0) {
                        segmentT = (t * totalLineLength - accumulatedLength) / segmentLength;
                    }
                    break;
                }
                accumulatedLength += segmentLength;
            }

            const p1 = centerLinePoints[segmentIndex];
            const p2 = centerLinePoints[Math.min(segmentIndex + 1, centerLinePoints.length - 1)];
            
            const worldX = p1.x + (p2.x - p1.x) * segmentT;
            const worldZ = p1.z + (p2.z - p1.z) * segmentT;
            
            const gridX = ((worldX + terrainDimensions.width / 2) / terrainDimensions.width) * rawWidth;
            const gridZ = ((worldZ + terrainDimensions.height / 2) / terrainDimensions.height) * rawHeight;
            
            const x0 = Math.floor(gridX);
            const z0 = Math.floor(gridZ);
            const x1 = Math.min(x0 + 1, rawWidth - 1);
            const z1 = Math.min(z0 + 1, rawHeight - 1);
            const fx = gridX - x0;
            const fz = gridZ - z0;

            const clampedX0 = Math.max(0, Math.min(rawWidth - 1, x0));
            const clampedZ0 = Math.max(0, Math.min(rawHeight - 1, z0));
            const clampedX1 = Math.max(0, Math.min(rawWidth - 1, x1));
            const clampedZ1 = Math.max(0, Math.min(rawHeight - 1, z1));

            const v00 = heightData[clampedZ0 * rawWidth + clampedX0];
            const v10 = heightData[clampedZ0 * rawWidth + clampedX1];
            const v01 = heightData[clampedZ1 * rawWidth + clampedX0];
            const v11 = heightData[clampedZ1 * rawWidth + clampedX1];

            const grayValue = v00 * (1 - fx) * (1 - fz) + 
                             v10 * fx * (1 - fz) + 
                             v01 * (1 - fx) * fz + 
                             v11 * fx * fz;
            
            const actualElevation = minElevation + (grayValue / 255) * elevationRange;
            
            totalDistance = t * totalLineLength;
            
            profileData.push({
                distance: totalDistance,
                elevation: actualElevation,
                x: worldX,
                z: worldZ
            });
        }

        drawProfileChart(profileData);
    }

    function drawProfileChart(profileData) {
        const panel = document.getElementById('profile-panel');
        const canvas = document.getElementById('profile-canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('profile-info');
        
        panel.style.display = 'block';
        
        const width = canvas.width;
        const height = canvas.height;
        const padding = { top: 30, right: 20, bottom: 40, left: 50 };
        const chartWidth = width - padding.left - padding.right;
        const chartHeight = height - padding.top - padding.bottom;

        ctx.fillStyle = '#1f2937';
        ctx.fillRect(0, 0, width, height);

        const elevations = profileData.map(d => d.elevation);
        const distances = profileData.map(d => d.distance);
        const minElev = Math.min(...elevations);
        const maxElev = Math.max(...elevations);
        const maxDist = Math.max(...distances);

        const elevRange = maxElev - minElev || 1;
        const elevPadding = elevRange * 0.1;

        ctx.strokeStyle = '#374151';
        ctx.lineWidth = 1;
        
        for (let i = 0; i <= 5; i++) {
            const y = padding.top + (chartHeight / 5) * i;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(width - padding.right, y);
            ctx.stroke();
            
            const elev = maxElev + elevPadding - ((elevRange + elevPadding * 2) / 5) * i;
            ctx.fillStyle = '#9ca3af';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(elev.toFixed(0) + 'm', padding.left - 5, y + 3);
        }

        for (let i = 0; i <= 5; i++) {
            const x = padding.left + (chartWidth / 5) * i;
            ctx.beginPath();
            ctx.moveTo(x, padding.top);
            ctx.lineTo(x, height - padding.bottom);
            ctx.stroke();
            
            const dist = (maxDist / 5) * i;
            ctx.fillStyle = '#9ca3af';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(dist.toFixed(0) + 'm', x, height - padding.bottom + 15);
        }

        const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
        gradient.addColorStop(0, 'rgba(34, 197, 94, 0.8)');
        gradient.addColorStop(0.5, 'rgba(132, 204, 22, 0.6)');
        gradient.addColorStop(1, 'rgba(234, 179, 8, 0.4)');

        ctx.beginPath();
        ctx.moveTo(padding.left, height - padding.bottom);
        
        profileData.forEach((d, i) => {
            const x = padding.left + (d.distance / maxDist) * chartWidth;
            const y = padding.top + chartHeight - ((d.elevation - minElev + elevPadding) / (elevRange + elevPadding * 2)) * chartHeight;
            
            if (i === 0) {
                ctx.lineTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        });
        
        ctx.lineTo(padding.left + chartWidth, height - padding.bottom);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.beginPath();
        profileData.forEach((d, i) => {
            const x = padding.left + (d.distance / maxDist) * chartWidth;
            const y = padding.top + chartHeight - ((d.elevation - minElev + elevPadding) / (elevRange + elevPadding * 2)) * chartHeight;
            
            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        });
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#e5e7eb';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('地形剖面图', width / 2, 18);
        
        ctx.font = '10px sans-serif';
        ctx.fillStyle = '#9ca3af';
        ctx.fillText('距离 (m)', width / 2, height - 5);
        
        ctx.save();
        ctx.translate(12, height / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('高程 (m)', 0, 0);
        ctx.restore();

        const totalDist = distances[distances.length - 1];
        const avgElev = elevations.reduce((a, b) => a + b, 0) / elevations.length;
        const elevGain = elevations.reduce((gain, elev, i) => {
            if (i === 0) return 0;
            const diff = elev - elevations[i - 1];
            return gain + (diff > 0 ? diff : 0);
        }, 0);
        const elevLoss = elevations.reduce((loss, elev, i) => {
            if (i === 0) return 0;
            const diff = elev - elevations[i - 1];
            return loss + (diff < 0 ? -diff : 0);
        }, 0);

        info.innerHTML = `
            <div class="grid grid-cols-2 gap-2">
                <div><span class="text-slate-500">总距离:</span> <span class="text-white">${totalDist.toFixed(1)} m</span></div>
                <div><span class="text-slate-500">采样点数:</span> <span class="text-white">${profileData.length}</span></div>
                <div><span class="text-slate-500">最低高程:</span> <span class="text-green-400">${minElev.toFixed(1)} m</span></div>
                <div><span class="text-slate-500">最高高程:</span> <span class="text-red-400">${maxElev.toFixed(1)} m</span></div>
                <div><span class="text-slate-500">平均高程:</span> <span class="text-blue-400">${avgElev.toFixed(1)} m</span></div>
                <div><span class="text-slate-500">高差:</span> <span class="text-yellow-400">${(maxElev - minElev).toFixed(1)} m</span></div>
                <div><span class="text-slate-500">累计爬升:</span> <span class="text-orange-400">${elevGain.toFixed(1)} m</span></div>
                <div><span class="text-slate-500">累计下降:</span> <span class="text-cyan-400">${elevLoss.toFixed(1)} m</span></div>
            </div>
        `;
    }

    function showFlowLines() {
        if (!heightData || !terrain) {
            alert('请先导入高度图数据');
            document.getElementById('river-toggle').classList.remove('active');
            return;
        }

        if (flowLinesGroup) {
            if (terrainGroup) {
                terrainGroup.add(flowLinesGroup);
            }
            return;
        }

        flowMap = new Float32Array(heightData.length);
        for (let i = 0; i < flowMap.length; i++) {
            flowMap[i] = 0;
        }

        calculateFlowMap();

        flowLinesGroup = new THREE.Group();
        if (terrainGroup) {
            terrainGroup.add(flowLinesGroup);
        }

        const gridWidth = rawWidth;
        const gridHeight = rawHeight;

        for (let y = 1; y < gridHeight - 1; y++) {
            for (let x = 1; x < gridWidth - 1; x++) {
                const idx = y * gridWidth + x;
                if (flowMap[idx] > 2) {
                    const flow = flowMap[idx];
                    if (flow > 5) {
                        const worldPos = getWorldPosition(x, y, heightData[idx]);
                        const direction = getFlowDirection(x, y);
                        if (direction) {
                            const nextPos = getWorldPosition(x + direction.x, y + direction.y, heightData[idx]);
                            const line = createFlowLine(worldPos, nextPos, flow);
                            flowLinesGroup.add(line);
                        }
                    }
                }
            }
        }

        if (terrainGroup) {
            terrainGroup.add(flowLinesGroup);
        }
    }

    function hideFlowLines() {
        if (flowLinesGroup && terrainGroup) {
            terrainGroup.remove(flowLinesGroup);
            flowLinesGroup = null;
        }
    }

    function calculateFlowMap() {
        if (!heightData || !flowMap) return;

        const gridWidth = rawWidth;
        const gridHeight = rawHeight;
        const seaLevel = 0;

        for (let y = 1; y < gridHeight - 1; y++) {
            for (let x = 1; x < gridWidth - 1; x++) {
                const idx = y * gridWidth + x;
                const h = heightData[idx];

                if (h > seaLevel) {
                    const neighbors = [
                        { dx: -1, dy: 0 },
                        { dx: 1, dy: 0 },
                        { dx: 0, dy: -1 },
                        { dx: 0, dy: 1 },
                        { dx: -1, dy: -1 },
                        { dx: 1, dy: -1 },
                        { dx: -1, dy: 1 },
                        { dx: 1, dy: 1 }
                    ];

                    let maxSlope = 0;
                    let flowDirection = null;

                    for (const n of neighbors) {
                        const nx = x + n.dx;
                        const ny = y + n.dy;
                        const nIdx = ny * gridWidth + nx;
                        const nh = heightData[nIdx];
                        const slope = h - nh;

                        if (slope > maxSlope) {
                            maxSlope = slope;
                            flowDirection = n;
                        }
                    }

                    if (maxSlope > 0.5) {
                        flowMap[idx] = maxSlope * 10;
                    }
                }
            }
        }

        for (let i = 0; i < 3; i++) {
            diffuseFlow();
        }
    }

    function diffuseFlow() {
        if (!flowMap) return;

        const gridWidth = rawWidth;
        const gridHeight = rawHeight;
        const newFlowMap = new Float32Array(flowMap.length);

        for (let y = 1; y < gridHeight - 1; y++) {
            for (let x = 1; x < gridWidth - 1; x++) {
                const idx = y * gridWidth + x;
                const h = heightData[idx];

                if (h > 0) {
                    let flow = flowMap[idx];

                    if (flow > 0) {
                        const neighbors = [
                            { dx: -1, dy: 0, idx: idx - 1 },
                            { dx: 1, dy: 0, idx: idx + 1 },
                            { dx: 0, dy: -1, idx: idx - gridWidth },
                            { dx: 0, dy: 1, idx: idx + gridWidth }
                        ];

                        let totalWeight = 0;
                        let weightedFlow = 0;

                        for (const n of neighbors) {
                            const nh = heightData[n.idx];
                            if (nh < h) {
                                const weight = (h - nh);
                                totalWeight += weight;
                                weightedFlow += flowMap[n.idx] * weight;
                            }
                        }

                        if (totalWeight > 0) {
                            newFlowMap[idx] = weightedFlow / totalWeight;
                        } else {
                            newFlowMap[idx] = flow * 0.95;
                        }
                    }
                }
            }
        }

        flowMap = newFlowMap;
    }

    function getFlowDirection(x, y) {
        const gridWidth = rawWidth;
        const gridHeight = rawHeight;
        const idx = y * gridWidth + x;
        const h = heightData[idx];

        const neighbors = [
            { dx: -1, dy: 0 },
            { dx: 1, dy: 0 },
            { dx: 0, dy: -1 },
            { dx: 0, dy: 1 },
            { dx: -1, dy: -1 },
            { dx: 1, dy: -1 },
            { dx: -1, dy: 1 },
            { dx: 1, dy: 1 }
        ];

        let maxSlope = 0;
        let direction = null;

        for (const n of neighbors) {
            const nx = x + n.dx;
            const ny = y + n.dy;
            if (nx >= 0 && nx < gridWidth && ny >= 0 && ny < gridHeight) {
                const nIdx = ny * gridWidth + nx;
                const nh = heightData[nIdx];
                const slope = h - nh;

                if (slope > maxSlope) {
                    maxSlope = slope;
                    direction = n;
                }
            }
        }

        return direction;
    }

    function getWorldPosition(gridX, gridY, height) {
        const meshWidth = terrainDimensions.width;
        const meshHeight = terrainDimensions.height;
        
        const x = (gridX / rawWidth) * meshWidth - meshWidth / 2;
        const z = (gridY / rawHeight) * meshHeight - meshHeight / 2;
        
        return new THREE.Vector3(x, height + 0.5, z);
    }

    function createFlowLine(start, end, flow) {
        const midY = (start.y + end.y) / 2;
        
        const path = new THREE.LineCurve3(
            new THREE.Vector3(start.x, midY, start.z),
            new THREE.Vector3(end.x, midY, end.z)
        );
        
        const radius = Math.min(0.3, flow * 0.02);
        const geometry = new THREE.TubeGeometry(path, 4, radius, 6, false);
        
        let color = 0x0ea5e9;
        if (flow > 20) {
            color = 0x3b82f6;
        }
        if (flow > 40) {
            color = 0x8b5cf6;
        }
        
        const material = new THREE.MeshBasicMaterial({ 
            color: color,
            depthTest: false,
            depthWrite: false,
            transparent: true,
            opacity: 0.8
        });
        
        const line = new THREE.Mesh(geometry, material);
        line.renderOrder = 3;
        
        return line;
    }
