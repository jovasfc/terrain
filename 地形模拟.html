<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 地貌分析系统 - 增强版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.0.1/dist-browser/geotiff.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #09090b; font-family: ui-sans-serif, system-ui, sans-serif; }
        canvas { display: block; }
        
        .panel {
            position: absolute;
            background: rgba(18, 18, 21, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .panel-content { padding: 16px; transition: all 0.3s; overflow-y: auto; max-height: calc(100vh - 150px); }
        .panel.collapsed .panel-content { display: none; }

        .controls-panel { top: 20px; left: 20px; width: 300px; }
        .palette-panel { top: 20px; right: 20px; width: 280px; }

        .drawing-toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 21, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .drawing-toolbar .btn-action {
            width: auto;
            min-width: 50px;
            padding: 8px 16px;
        }

        .section-title {
            font-size: 0.65rem; text-transform: uppercase; color: #71717a;
            letter-spacing: 0.15em; margin-bottom: 0.8rem; margin-top: 1.2rem;
            display: flex; align-items: center; font-weight: 700;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.05); margin-left: 10px; }

        input[type="range"] { width: 100%; height: 4px; background: #27272a; border-radius: 2px; appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; }

        .btn-action {
            background: #27272a; border: 1px solid #3f3f46; color: #a1a1aa;
            padding: 6px; border-radius: 6px; font-size: 11px; transition: all 0.2s;
            text-align: center; width: 100%;
        }
        .btn-action:hover { border-color: #71717a; color: #fff; }
        .btn-action.active { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; color: #60a5fa; }
        .btn-action.hidden { display: none; }
        .texture-btn.hidden { display: none; }
        .btn-danger:hover { border-color: #ef4444; color: #f87171; }

        .palette-card {
            padding: 5px; border-radius: 10px; border: 1px solid transparent;
            cursor: pointer; transition: all 0.2s; margin-bottom: 3px;
            background: rgba(255,255,255,0.02);
            display: flex; flex-direction: column; gap: 3px;
        }
        .palette-card:hover { background: rgba(255,255,255,0.04); }
        .palette-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }

        .swatch-row { 
            display: flex; 
            height: 10px; 
            border-radius: 3px; 
            overflow: hidden; 
            width: 100%;
        }
        .swatch-item { 
            flex: 1; 
            height: 100%; 
            border-right: 0.5px solid rgba(0,0,0,0.1); 
        }
        .swatch-item:last-child { border-right: none; }

        .toggle-switch {
            position: relative; width: 36px; height: 20px;
            background: #27272a; border-radius: 20px; cursor: pointer;
        }
        .toggle-circle {
            position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
            background: #a1a1aa; border-radius: 50%; transition: 0.2s;
        }
        input:checked + .toggle-switch { background: #3b82f6; }
        input:checked + .toggle-switch .toggle-circle { transform: translateX(16px); background: #fff; }

        .floating-toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 21, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: move;
            user-select: none;
            min-width: fit-content;
            transition: opacity 0.2s;
        }

        .floating-toolbar.collapsed {
            padding: 8px;
        }

        .floating-toolbar.collapsed .toolbar-content {
            display: none;
        }

        .toolbar-toggle {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            padding: 8px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toolbar-toggle:hover {
            border-color: #71717a;
            color: #fff;
        }

        .toolbar-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .toolbar-btn {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            transition: all 0.2s;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            border-color: #71717a;
            color: #fff;
            background: #3f3f46;
        }

        .toolbar-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #60a5fa;
        }

        .toolbar-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: #60a5fa;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- 数据加载进度弹窗 -->
<div id="loading-modal" class="fixed inset-0 bg-black/80 z-[9999] hidden flex items-center justify-center">
    <div class="bg-zinc-900 rounded-2xl p-8 max-w-sm w-full mx-4 text-center border border-zinc-700 shadow-2xl">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mx-auto mb-6"></div>
        <h3 class="text-xl font-bold text-white mb-2" id="loading-title">等待数据</h3>
        <p class="text-zinc-400 text-sm mb-4" id="loading-message">正在等待下载页面传输数据...</p>
        <div class="w-full bg-zinc-800 rounded-full h-2 mb-2">
            <div id="loading-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <p class="text-zinc-500 text-xs" id="loading-status">请勿关闭此页面</p>
    </div>
</div>

<!-- 浮动工具条 -->
<div class="floating-toolbar" id="toolbar">
    <button class="toolbar-toggle" id="toolbar-toggle-btn">🔧</button>
    <div class="toolbar-content">
        <button class="toolbar-btn" id="tool-marker" title="点击标记高程">📍 标记高程</button>
        <button class="toolbar-btn" id="tool-line" title="划线计算长度">📏 测量长度</button>
        <button class="toolbar-btn" id="tool-area" title="划区计算面积">📐 测量面积</button>
        <button class="toolbar-btn" id="tool-clear" title="清除所有标记">🗑️ 清除标记</button>
        <div class="toolbar-info" id="measure-info">距离: 0m</div>
    </div>
</div>

<!-- 左侧主控面板 -->
<div class="panel controls-panel" id="main-panel">
    <div class="panel-header" onclick="togglePanel('main-panel')">
        <div>
            <h1 class="text-sm font-bold">地貌引擎 v2.3</h1>
            <p class="text-[9px] text-zinc-500 tracking-tighter">ADVANCED TERRAIN SYSTEM</p>
        </div>
        <span class="fold-icon">▼</span>
    </div>
    <div class="panel-content">
        <button id="goto-download" class="btn-action w-full mb-0" title="跳转到下载页面">
            📥 前往下载页面
        </button>

        <!-- 1. 批量导入 -->
        <div class="section-title">批量导入</div>
        <div class="space-y-2">
            <div class="grid grid-cols-2 gap-2">
                <label class="btn-action cursor-pointer" title="导入ZIP文件，自动识别dem.png、dem.txt、sat.png">
                    📦 导入ZIP <input type="file" id="zip-input" accept=".zip" class="hidden">
                </label>
                <label class="btn-action cursor-pointer" title="选择文件夹，自动识别dem.png、dem.txt、sat.png">
                    📁 导入文件夹 <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">
                </label>
            </div>
            <div id="import-status" class="text-[10px] text-zinc-500 hidden"></div>
            <div id="dem-info-display" class="text-[10px] text-zinc-400 hidden mt-2 p-2 bg-zinc-800 rounded"></div>
        </div>

        <!-- 2. 数据交互 -->
        <div class="section-title">数据交互</div>
        <div class="grid grid-cols-3 gap-2">
            <label class="btn-action cursor-pointer">
                高度图 <input type="file" id="heightmap-input" accept="image/*" class="hidden">
            </label>
            <label class="btn-action cursor-pointer">
                纹理图 <input type="file" id="texture-input" accept="image/*" class="hidden">
            </label>
            <label class="btn-action cursor-pointer" title="导入DEM统计信息文件">
                高程值 <input type="file" id="dem-txt-input" accept=".txt" class="hidden">
            </label>
            <button id="generate-random-terrain" class="btn-action col-span-3" title="生成随机地形">🎲 生成随机地形</button>
            <button id="remove-texture" class="btn-action btn-danger col-span-3 hidden">移除叠加纹理</button>
            <div id="texture-switcher" class="col-span-3 hidden">
                <div class="text-[10px] text-zinc-400 mb-2">切换纹理</div>
                <div class="grid grid-cols-4 gap-2">
                    <button class="texture-btn btn-action active" data-texture="sat">卫星图</button>
                    <button class="texture-btn btn-action" data-texture="openmap">OpenMap</button>
                    <button class="texture-btn btn-action" data-texture="map">地图</button>
                    <button class="texture-btn btn-action" data-texture="satellite">ESRI卫星</button>
                    <button class="texture-btn btn-action" data-texture="esri">ESRI地图</button>
                    <button class="texture-btn btn-action" data-texture="topo">ESRI地形</button>
                    <button class="texture-btn btn-action" data-texture="natgeo">国家地理</button>
                    <button class="texture-btn btn-action" data-texture="transport">ESRI交通</button>
                    <button class="texture-btn btn-action" data-texture="relief">ESRI阴影</button>
                    <button class="texture-btn btn-action" data-texture="osm">OSM</button>
                    <button class="texture-btn btn-action" data-texture="gaode">高德卫星</button>
                </div>
            </div>
        </div>

        <!-- 3. 地形调节 -->
        <div class="section-title">地形调节</div>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>渲染精度</label>
                        <span id="detail-val" class="text-blue-400 font-mono">360</span>
                    </div>
                    <input type="range" id="detail-scale" min="90" max="720" step="90" value="360">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>高度系数</label>
                        <span id="height-val" class="text-blue-400 font-mono">1.00x</span>
                    </div>
                    <input type="range" id="height-scale" min="0" max="100" step="1" value="58">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>基座厚度</label>
                        <span id="skirt-depth-val" class="text-zinc-500 font-mono">20</span>
                    </div>
                    <input type="range" id="skirt-depth" min="0" max="100" step="5" value="20">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="flex items-center justify-between py-1">
                    <span class="text-[11px]">显示等高线</span>
                    <input type="checkbox" id="contour-toggle" class="w-4 h-4 accent-blue-500">
                </div>
                <div class="flex items-center justify-between py-1">
                    <span class="text-[11px]">显示高程</span>
                    <input type="checkbox" id="contour-labels-toggle" class="w-4 h-4 accent-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>等高距</label>
                        <span id="contour-spacing-val" class="text-zinc-500 font-mono">20.0</span>
                    </div>
                    <input type="range" id="contour-spacing" min="0" max="100" step="1" value="77">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>线宽</label>
                        <span id="contour-width-val" class="text-zinc-500 font-mono">1.0</span>
                    </div>
                    <input type="range" id="contour-width" min="0.5" max="5" step="0.5" value="1">
                </div>
            </div>
        </div>

        <!-- 4. 渲染模式 -->
        <div class="section-title">渲染模式</div>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div class="flex items-center justify-between py-1">
                    <span id="render-mode-label" class="text-[11px]">分层设色</span>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="render-mode-toggle" class="hidden">
                        <div class="toggle-switch"><div class="toggle-circle"></div></div>
                    </label>
                </div>
                <div class="flex items-center justify-between py-1">
                    <span class="text-[11px]">去除配色</span>
                    <input type="checkbox" id="remove-palette-toggle" class="w-4 h-4 accent-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="flex items-center justify-between py-1">
                    <span class="text-[11px]">默认底色</span>
                    <input type="color" id="base-color" class="w-8 h-6 cursor-pointer rounded" value="#808080">
                </div>
                <div class="flex items-center justify-between py-1">
                    <span class="text-[11px]">等高线颜色</span>
                    <input type="color" id="contour-color" class="w-8 h-6 cursor-pointer rounded" value="#ffffff">
                </div>
            </div>
            <div>
                <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                    <label>显示纹理</label>
                    <input type="checkbox" id="show-texture-toggle" class="w-4 h-4 accent-blue-500" checked>
                </div>
                <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                    <label>纹理透明度</label>
                    <span id="texture-opacity-val" class="text-zinc-500 font-mono">80%</span>
                </div>
                <input type="range" id="texture-opacity" min="0" max="100" step="5" value="80">
            </div>
        </div>

        <!-- 5. 环境光照 -->
        <div class="section-title">环境光照</div>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>基础环境光</label>
                        <span id="ambient-val" class="text-zinc-500 font-mono">0.7</span>
                    </div>
                    <input type="range" id="ambient-intensity" min="0" max="2" step="0.1" value="0.7">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-[10px] text-zinc-400">
                        <label>太阳光强度</label>
                        <span id="sun-val" class="text-zinc-500 font-mono">0.9</span>
                    </div>
                    <input type="range" id="sun-intensity" min="0" max="3" step="0.1" value="0.9">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <div class="flex justify-between mb-2 text-[10px] text-zinc-400">
                        <label>太阳高度角</label>
                        <span id="sun-elevation-val" class="text-blue-400 font-mono">45°</span>
                    </div>
                    <input type="range" id="sun-elevation" min="0" max="90" step="1" value="45">
                </div>
                <div>
                    <div class="flex justify-between mb-2 text-[10px] text-zinc-400">
                        <label>太阳方位角</label>
                        <span id="sun-azimuth-val" class="text-blue-400 font-mono">45°</span>
                    </div>
                    <input type="range" id="sun-azimuth" min="0" max="360" step="1" value="45">
                </div>
            </div>
        </div>

        <!-- 6. 导出功能 -->
        <div class="section-title">导出功能</div>
        <div class="flex gap-2">
            <button id="export-contours" class="btn-action flex-1" title="导出等高线SVG、PNG和高度图DEM">
                📏 导出等高线
            </button>
            <button id="export-hypsometric" class="btn-action flex-1" title="导出分层设色地形图SVG和PNG">
                🎨 导出分层设色
            </button>
        </div>

        <div class="section-title">太阳位置计算</div>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <div class="flex justify-between mb-2 text-[10px] text-zinc-400">
                        <label>纬度</label>
                        <span id="latitude-val" class="text-zinc-500 font-mono">39.9°</span>
                    </div>
                    <input type="range" id="latitude" min="-90" max="90" step="0.1" value="39.9">
                </div>
                <div>
                    <div class="flex justify-between mb-2 text-[10px] text-zinc-400">
                        <label>日期</label>
                        <span id="date-val" class="text-zinc-500 font-mono">2024-06-21</span>
                    </div>
                    <input type="date" id="date-input" class="w-full px-2 py-1 text-[10px] bg-zinc-800 border border-zinc-700 rounded text-zinc-300">
                </div>
            </div>
            <div class="flex gap-2">
                <button id="auto-locate" class="btn-action flex-1">自动获取位置</button>
                <button id="auto-date" class="btn-action flex-1">自动获取日期</button>
                <button id="calc-sun" class="btn-action flex-1 bg-blue-900/30 border-blue-800">计算太阳位置</button>
            </div>
        </div>

        <div class="section-title">时间控制</div>
        <div class="space-y-3">
            <div>
                <div class="flex justify-between mb-2 text-[10px] text-zinc-400">
                    <label>时间</label>
                    <span id="time-val" class="text-zinc-500 font-mono">12:00</span>
                </div>
                <input type="range" id="time-slider" min="0" max="1440" step="1" value="720">
                <div class="flex justify-between mt-1 text-[9px] text-zinc-600">
                    <span id="sunrise-time">日出: --:--</span>
                    <span id="sunset-time">日落: --:--</span>
                </div>
            </div>
        </div>

        <div class="section-title">可视化增强</div>
        <div class="grid grid-cols-2 gap-2">
            <button id="wireframe-toggle" class="btn-action">结构网格</button>
            <button id="river-toggle" class="btn-action">水流追踪</button>
        </div>
    </div>
</div>

<!-- 底部绘制工具条 -->
<div class="drawing-toolbar">
    <button id="draw-point" class="btn-action">点</button>
    <button id="draw-line" class="btn-action">线</button>
    <button id="draw-polygon" class="btn-action">面</button>
    <button id="draw-arrow" class="btn-action">箭头</button>
    <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px;"></div>
    <button id="calc-line-length" class="btn-action">计算长度</button>
    <button id="draw-profile" class="btn-action">剖面图</button>
    <button id="clear-drawings" class="btn-action btn-danger">清除绘制</button>
</div>

<!-- 右侧配色面板 -->
<div class="panel palette-panel" id="color-panel">
    <div class="panel-header" onclick="togglePanel('color-panel')">
        <div class="section-title !m-0">18种配色方案</div>
        <span class="fold-icon">▼</span>
    </div>
    <div class="panel-content overflow-y-auto max-h-[65vh]" id="palette-list">
        <!-- 动态生成 -->
    </div>
    <div class="panel-content" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1px; padding-bottom: 20px;">
        <div class="section-title">自定义配色</div>
        
        <div class="grid grid-cols-8 gap-0 mb-3" id="custom-color-inputs">
            <input type="color" class="w-full h-6 cursor-pointer" value="#051a10" >
            <input type="color" class="w-full h-6 cursor-pointer" value="#14311c" >
            <input type="color" class="w-full h-6 cursor-pointer" value="#2a4d31" >
            <input type="color" class="w-full h-6 cursor-pointer" value="#4d5d3d" >
            <input type="color" class="w-full h-6 cursor-pointer" value="#7b6d4e" >
            <input type="color" class="w-full h-6 cursor-pointer" value="#a38c6d" >

<script>
    let scene, camera, renderer, controls, terrain, geometry, material;
    let ambientLight, sunLight;
    let heightData = null, rawWidth = 0, rawHeight = 0;
    let flowLinesGroup = null;
    let flowMap = null;
    let terrainDimensions = { width: 200, height: 200 };
    let customTexture = null;
    let contourLabelsGroup = null;
    let terrainGroup = null;
    let skirtMesh = null, bottomMesh = null;
    
    let drawingMode = null;
    let drawingsGroup = new THREE.Group();
    let currentDrawing = null;
    let drawingPoints = [];
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let isDrawing = false;
    let lastClickTime = 0;
    let previewLine = null;
    let previewPoints = [];
    let previewPointMarkers = [];
    let tempPreviewMarker = null;
    
    const paletteData = [
        { name: '经典地理', colors: [0x051a10, 0x14311c, 0x2a4d31, 0x4d5d3d, 0x7b6d4e, 0xa38c6d, 0xd4c0a1, 0xffffff] },
        { name: '卫星遥感', colors: [0x0b141a, 0x1a2b26, 0x2d3d2a, 0x4a5c31, 0x7a8a47, 0xa49a6a, 0xd1c4a1, 0xf2ebe1] },
        { name: '冰岛苔藓', colors: [0x0c1109, 0x182312, 0x27381b, 0x3d542d, 0x5a7a44, 0x82a664, 0xafd193, 0xe4f2d5] },
        { name: '热力熔岩', colors: [0x000000, 0x2d0a05, 0x5a1208, 0x8a1d0d, 0xbd2e15, 0xe04a2d, 0xf08060, 0xffd0b0] },
        { name: '深海极光', colors: [0x020617, 0x0a1435, 0x152b6b, 0x1e4bb5, 0x2dd4bf, 0x5eead4, 0x99f6e4, 0xf0fdfa] },
        { name: '数字赛博', colors: [0x09090b, 0x1e1b4b, 0x312e81, 0x4338ca, 0x6366f1, 0x818cf8, 0xa5b4fc, 0xe0e7ff] },
        { name: '赤色戈壁', colors: [0x270b02, 0x441507, 0x78350f, 0x92400e, 0xb45309, 0xd97706, 0xf59e0b, 0xfef3c7] },
        { name: '复古胶片', colors: [0x1c1917, 0x44403c, 0x78716c, 0xa8a29e, 0xd6d3d1, 0xe7e5e4, 0xf5f5f4, 0xffffff] },
        { name: '极地冬日', colors: [0x0f172a, 0x1e293b, 0x334155, 0x475569, 0x64748b, 0x94a3b8, 0xcbd5e1, 0xf8fafc] },
        { name: '热带丛林', colors: [0x064e3b, 0x065f46, 0x047857, 0x059669, 0x10b981, 0x34d399, 0x6ee7b7, 0xecfdf5] },
        { name: '沙漠黄昏', colors: [0x1a0a00, 0x3d1a00, 0x6b2c00, 0x9a4400, 0xc46200, 0xe68a00, 0xf5b800, 0xfff0d0] },
        { name: '海洋深蓝', colors: [0x000814, 0x001a33, 0x002d5c, 0x004488, 0x0060aa, 0x0080cc, 0x00a0e6, 0x00c8ff] },
        { name: '樱花粉黛', colors: [0x2d1f1f, 0x4a2c3a, 0x7a4a5a, 0xa86a7a, 0xd68a9a, 0xf0aab0, 0xfad0d6, 0xfff0f5] },
        { name: '秋日枫叶', colors: [0x1a0500, 0x3d0a00, 0x781400, 0xb91c1c, 0xdc2626, 0xef4444, 0xf87171, 0xfecaca] },
        { name: '翡翠森林', colors: [0x022c22, 0x047857, 0x059669, 0x10b981, 0x34d399, 0x6ee7b7, 0xa7f3d0, 0xd1fae5] },
        { name: '紫色星云', colors: [0x1e1b4b, 0x312e81, 0x4338ca, 0x6366f1, 0x818cf8, 0xa5b4fc, 0xc7d2fe, 0xe0e7ff] },
        { name: '青铜时代', colors: [0x1c1917, 0x44403c, 0x78716c, 0xa8a29e, 0xd6d3d1, 0xb45309, 0xd97706, 0xfcd34d] },
        { name: '水墨丹青', colors: [0x000000, 0x1f2937, 0x374151, 0x4b5563, 0x6b7280, 0x9ca3af, 0xd1d5db, 0xf3f4f6] }
    ];

    let currentPalette = paletteData[0].colors;
    let isSmoothMode = false;

    init();
    renderPaletteList();
    createDefaultTerrain();
    
    setTimeout(() => {
        const dateStr = document.getElementById('date-input').value;
        const latitude = parseFloat(document.getElementById('latitude').value);
        if (dateStr) {
            const times = calculateSunriseSunset(latitude, dateStr);
            document.getElementById('sunrise-time').innerText = `日出: ${times.sunrise || '--:--'}`;
            document.getElementById('sunset-time').innerText = `日落: ${times.sunset || '--:--'}`;
        }
    }, 100);
    
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(220, 220, 220);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 创建raycaster用于点击检测
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // 点击标记点组
        const markerGroup = new THREE.Group();
        scene.add(markerGroup);
        window.markerGroup = markerGroup;
        
        // 地形组（包含地形、基座、方位标记）
        terrainGroup = new THREE.Group();
        scene.add(terrainGroup);
        
        // 绘制组
        scene.add(drawingsGroup);
        drawingsGroup.renderOrder = 1;
        
        // 工具模式：marker, line, area, none
        window.currentToolMode = 'none';
        window.measurePoints = [];
        window.measureLines = [];
        window.measureAreas = [];
        window.measureMarkers = [];
        
        // 切换工具模式
        window.setToolMode = (mode) => {
            // 如果点击的是当前已选中的工具，则取消选择
            if (window.currentToolMode === mode) {
                window.currentToolMode = 'none';
                window.measurePoints = [];
                
                // 更新按钮状态
                document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
                
                // 清除旧的测量线和区域
                clearMeasurements();
                
                // 更新信息显示
                document.getElementById('measure-info').innerText = '选择工具开始测量';
                return;
            }
            
            window.currentToolMode = mode;
            window.measurePoints = [];
            
            // 更新按钮状态
            document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
            if (mode !== 'none') {
                document.getElementById('tool-' + mode).classList.add('active');
            }
            
            // 清除旧的测量线和区域
            clearMeasurements();
            
            // 更新信息显示
            const infoEl = document.getElementById('measure-info');
            if (mode === 'marker') {
                infoEl.innerText = '点击标记高程';
            } else if (mode === 'line') {
                infoEl.innerText = '点击两点测量距离';
            } else if (mode === 'area') {
                infoEl.innerText = '点击多点测量面积';
            } else {
                infoEl.innerText = '选择工具开始测量';
            }
        };
        
        // 清除测量
        function clearMeasurements() {
            window.measureLines.forEach(line => {
                if (line.geometry) line.geometry.dispose();
                if (line.material) line.material.dispose();
                if (line.parent) line.parent.remove(line);
            });
            window.measureAreas.forEach(area => {
                if (area.geometry) area.geometry.dispose();
                if (area.material) area.material.dispose();
                if (area.parent) area.parent.remove(area);
            });
            window.measureLines = [];
            window.measureAreas = [];
        }
        
        // 添加点击事件监听器
        renderer.domElement.addEventListener('click', (event) => {
            // 如果没有选择工具，不执行任何操作
            if (window.currentToolMode === 'none') {
                return;
            }
            
            // 计算鼠标位置（归一化设备坐标）
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // 从相机发射射线
            raycaster.setFromCamera(mouse, camera);
            
            // 检测与地形的交点
            if (terrain) {
                const intersects = raycaster.intersectObject(terrain);
                
                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    const point = intersect.point;
                    const uv = intersect.uv;
                    
                    // 根据UV坐标计算在heightData中的位置
                    const x = Math.floor(uv.x * (rawWidth - 1));
                    const y = Math.floor((1 - uv.y) * (rawHeight - 1));
                    const grayValue = heightData[y * rawWidth + x];
                    
                    // 计算实际高程值（使用demInfo中的实际高程范围）
                    const elevationRange = (window.demInfo && window.demInfo.elevationRange) ? window.demInfo.elevationRange : 50;
                    const minElevation = (window.demInfo && window.demInfo.min) ? window.demInfo.min : 0;
                    const actualElevation = minElevation + (grayValue / 255) * elevationRange;
                    
                    if (window.currentToolMode === 'marker') {
                        // 标记高程模式
                        const markerGeometry = new THREE.SphereGeometry(2, 16, 16);
                        const markerMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                        const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                        marker.position.copy(point);
                        markerGroup.add(marker);
                        
                        const label = createElevationLabel(actualElevation.toFixed(1) + 'm', point);
                        markerGroup.add(label);
                    } else if (window.currentToolMode === 'line') {
                        // 测量长度模式
                        window.measurePoints.push(point);
                        
                        // 创建测量点标记
                        const markerGeometry = new THREE.SphereGeometry(1.5, 16, 16);
                        const markerMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                        const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                        marker.position.copy(point);
                        markerGroup.add(marker);
                        window.measureMarkers.push(marker);
                        
                        if (window.measurePoints.length === 2) {
                            const p1 = window.measurePoints[0];
                            const p2 = window.measurePoints[1];
                            
                            // 计算真实距离
                            let distanceText;
                            if (window.terrainRealSize) {
                                const realDistance = calculateRealDistance(p1, p2);
                                if (realDistance >= 1000) {
                                    distanceText = `距离: ${(realDistance / 1000).toFixed(2)} km`;
                                } else {
                                    distanceText = `距离: ${realDistance.toFixed(1)} m`;
                                }
                            } else {
                                const distance = p1.distanceTo(p2);
                                distanceText = `距离: ${distance.toFixed(2)}m (无经纬度)`;
                            }
                            
                            // 创建测量线
                            const lineGeometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
                            const line = new THREE.Line(lineGeometry, lineMaterial);
                            scene.add(line);
                            window.measureLines.push(line);
                            
                            // 更新信息显示
                            document.getElementById('measure-info').innerText = distanceText;
                            
                            window.measurePoints = [];
                        }
                    } else if (window.currentToolMode === 'area') {
                        // 测量面积模式
                        window.measurePoints.push(point);
                        
                        // 创建测量点标记
                        const markerGeometry = new THREE.SphereGeometry(1.5, 16, 16);
                        const markerMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                        const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                        marker.position.copy(point);
                        markerGroup.add(marker);
                        window.measureMarkers.push(marker);
                        
                        if (window.measurePoints.length >= 3) {
                            // 计算多边形面积（投影到XZ平面）
                            const points = window.measurePoints.map(p => new THREE.Vector2(p.x, p.z));
                            
                            // 计算真实面积
                            let areaText;
                            if (window.terrainRealSize) {
                                const realArea = calculateRealArea(points);
                                if (realArea >= 1000000) {
                                    areaText = `面积: ${(realArea / 1000000).toFixed(2)} km²`;
                                } else {
                                    areaText = `面积: ${realArea.toFixed(1)} m²`;
                                }
                            } else {
                                const area = calculatePolygonArea(points);
                                areaText = `面积: ${area.toFixed(2)}m² (无经纬度)`;
                            }
                            
                            // 创建多边形
                            const shape = new THREE.Shape();
                            shape.moveTo(points[0].x, points[0].y);
                            for (let i = 1; i < points.length; i++) {
                                shape.lineTo(points[i].x, points[i].y);
                            }
                            shape.lineTo(points[0].x, points[0].y);
                            
                            const geometry = new THREE.ShapeGeometry(shape);
                            const material = new THREE.MeshBasicMaterial({ 
                                color: 0x00ff00, 
                                transparent: true, 
                                opacity: 0.3,
                                side: THREE.DoubleSide
                            });
                            const mesh = new THREE.Mesh(geometry, material);
                            mesh.rotation.x = -Math.PI / 2;
                            mesh.position.y = point.y + 0.1;
                            scene.add(mesh);
                            window.measureAreas.push(mesh);
                            
                            // 更新信息显示
                            document.getElementById('measure-info').innerText = areaText;
                            
                            window.measurePoints = [];
                        }
                    }
                }
            }
        });
        
        // 计算真实距离（考虑经纬度）
        function calculateRealDistance(p1, p2) {
            if (!window.terrainRealSize) return p1.distanceTo(p2);
            
            const size = window.terrainRealSize;
            
            // 计算X方向（东西）和Z方向（南北）的显示距离
            const dx = Math.abs(p2.x - p1.x);
            const dz = Math.abs(p2.z - p1.z);
            
            // 转换为真实距离
            const realDx = (dx / size.displayWidth) * size.realWidthMeters;
            const realDz = (dz / size.displayHeight) * size.realHeightMeters;
            
            // 使用勾股定理计算真实距离
            return Math.sqrt(realDx * realDx + realDz * realDz);
        }
        
        // 计算真实面积（考虑经纬度）
        function calculateRealArea(points) {
            if (!window.terrainRealSize) return calculatePolygonArea(points);
            
            const size = window.terrainRealSize;
            
            // 将显示坐标转换为真实坐标
            const realPoints = points.map(p => ({
                x: (p.x / size.displayWidth) * size.realWidthMeters,
                y: (p.y / size.displayHeight) * size.realHeightMeters
            }));
            
            // 使用鞋带公式计算面积
            return calculatePolygonArea(realPoints);
        }
        
        // 计算多边形面积（使用鞋带公式）
        function calculatePolygonArea(points) {
            let area = 0;
            const n = points.length;
            for (let i = 0; i < n; i++) {
                const j = (i + 1) % n;
                area += points[i].x * points[j].y;
                area -= points[j].x * points[i].y;
            }
            return Math.abs(area) / 2;
        }
        
        // 清除标记按钮
        window.clearMarkers = () => {
            // 清除markerGroup中的所有标记
            while(markerGroup.children.length > 0) {
                const child = markerGroup.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
                markerGroup.remove(child);
            }
            
            // 清除测量线
            if (window.measureLines) {
                window.measureLines.forEach(line => {
                    if (line.geometry) line.geometry.dispose();
                    if (line.material) line.material.dispose();
                    if (line.parent) line.parent.remove(line);
                });
                window.measureLines = [];
            }
            
            // 清除测量区域
            if (window.measureAreas) {
                window.measureAreas.forEach(area => {
                    if (area.geometry) area.geometry.dispose();
                    if (area.material) area.material.dispose();
                    if (area.parent) area.parent.remove(area);
                });
                window.measureAreas = [];
            }
            
            // 清除测量标记点
            if (window.measureMarkers) {
                window.measureMarkers.forEach(marker => {
                    if (marker.geometry) marker.geometry.dispose();
                    if (marker.material) marker.material.dispose();
                    if (marker.parent) marker.parent.remove(marker);
                });
                window.measureMarkers = [];
            }
            
            // 重置测量点
            window.measurePoints = [];
            
            // 重置信息显示
            document.getElementById('measure-info').innerText = '选择工具开始测量';
        };

        ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
        updateSunPosition(45, 45);
        sunLight.castShadow = true;
        scene.add(sunLight);

        document.getElementById('detail-scale').addEventListener('input', function() {
            document.getElementById('detail-val').innerText = this.value;
            updateDetail();
        });
        document.getElementById('height-scale').addEventListener('input', updateHeight);
        document.getElementById('skirt-depth').addEventListener('input', function() {
            document.getElementById('skirt-depth-val').innerText = this.value;
            // 重新构建地形以更新基座
            if (heightData) {
                const canvas = document.createElement('canvas');
                canvas.width = rawWidth;
                canvas.height = rawHeight;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(rawWidth, rawHeight);
                for (let i = 0; i < heightData.length; i++) {
                    const v = Math.floor(heightData[i]);
                    imgData.data[i * 4] = v;
                    imgData.data[i * 4 + 1] = v;
                    imgData.data[i * 4 + 2] = v;
                    imgData.data[i * 4 + 3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
                buildTerrain(canvas);
            }
        });
        document.getElementById('render-mode-toggle').addEventListener('change', function() {
            isSmoothMode = this.checked;
            document.getElementById('render-mode-label').innerText = isSmoothMode ? '过渡色' : '分层设色';
            updateUniforms();
        });
        document.getElementById('contour-toggle').addEventListener('change', function() {
            updateUniforms();
            updateContourLabels();
        });
        document.getElementById('contour-spacing').addEventListener('input', function() {
            const sliderValue = parseFloat(this.value);
            // 对数变换：将0-100映射到1-50
            const logValue = logarithmicTransform(sliderValue, 1, 50);
            const actualSpacing = calculateActualContourSpacing(logValue);
            document.getElementById('contour-spacing-val').innerText = actualSpacing.toFixed(1);
            updateUniforms();
            updateContourLabels();
        });
        document.getElementById('contour-width').addEventListener('input', function() {
            document.getElementById('contour-width-val').innerText = this.value;
            updateUniforms();
        });
        document.getElementById('contour-labels-toggle').addEventListener('change', function() {
            updateContourLabels();
        });
        document.getElementById('remove-palette-toggle').addEventListener('change', updateUniforms);
        document.getElementById('texture-opacity').addEventListener('input', function() {
            document.getElementById('texture-opacity-val').innerText = this.value + '%';
            updateUniforms();
        });
        document.getElementById('base-color').addEventListener('input', updateUniforms);
        document.getElementById('contour-color').addEventListener('input', updateUniforms);
        document.getElementById('apply-custom-palette').addEventListener('click', applyCustomPalette);
        document.getElementById('wireframe-toggle').addEventListener('click', function() {
            this.classList.toggle('active');
            if(material) material.wireframe = this.classList.contains('active');
        });
        
        document.getElementById('river-toggle').addEventListener('click', function() {
            this.classList.toggle('active');
            if (this.classList.contains('active')) {
                showFlowLines();
            } else {
                hideFlowLines();
            }
        });
        
        document.getElementById('ambient-intensity').addEventListener('input', function() {
            ambientLight.intensity = parseFloat(this.value);
            document.getElementById('ambient-val').innerText = this.value;
        });
        document.getElementById('sun-intensity').addEventListener('input', function() {
            sunLight.intensity = parseFloat(this.value);
            document.getElementById('sun-val').innerText = this.value;
        });
        document.getElementById('sun-elevation').addEventListener('input', function() {
            const elevation = parseInt(this.value);
            const azimuth = parseInt(document.getElementById('sun-azimuth').value);
            updateSunPosition(elevation, azimuth);
            document.getElementById('sun-elevation-val').innerText = elevation + '°';
        });
        document.getElementById('sun-azimuth').addEventListener('input', function() {
            const azimuth = parseInt(this.value);
            const elevation = parseInt(document.getElementById('sun-elevation').value);
            updateSunPosition(elevation, azimuth);
            document.getElementById('sun-azimuth-val').innerText = azimuth + '°';
        });
        document.getElementById('latitude').addEventListener('input', function() {
            document.getElementById('latitude-val').innerText = parseFloat(this.value).toFixed(1) + '°';
        });
        document.getElementById('date-input').addEventListener('change', function() {
            document.getElementById('date-val').innerText = this.value;
        });
        document.getElementById('auto-locate').addEventListener('click', autoGetLocation);
        document.getElementById('auto-date').addEventListener('click', autoGetDate);
        document.getElementById('calc-sun').addEventListener('click', calculateSunPosition);
        document.getElementById('time-slider').addEventListener('input', function() {
            const timeMinutes = parseInt(this.value);
            const latitude = parseFloat(document.getElementById('latitude').value);
            const dateStr = document.getElementById('date-input').value;
            
            const hours = Math.floor(timeMinutes / 60);
            const minutes = timeMinutes % 60;
            document.getElementById('time-val').innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            if (dateStr) {
                const sunPos = calculateSunPositionByTime(timeMinutes, latitude, dateStr);
                document.getElementById('sun-elevation').value = sunPos.elevation.toFixed(0);
                document.getElementById('sun-elevation-val').innerText = sunPos.elevation.toFixed(0) + '°';

    // 等待数据就绪后自动加载
    function waitForDataAndLoad() {
        const modal = document.getElementById('loading-modal');
        const progress = document.getElementById('loading-progress');
        const message = document.getElementById('loading-message');
        const status = document.getElementById('loading-status');
        
        modal.classList.remove('hidden');
        
        let checkCount = 0;
        const maxChecks = 120;
        
        const checkInterval = setInterval(async () => {
            checkCount++;
            
            const progressPercent = Math.min((checkCount / maxChecks) * 80, 80);
            progress.style.width = progressPercent + '%';
            message.textContent = `正在等待下载页面传输数据... (${checkCount}/${maxChecks})`;
            
            const readyTime = localStorage.getItem('terrainZipReady');
            if (readyTime) {
                clearInterval(checkInterval);
                progress.style.width = '90%';
                message.textContent = '数据已就绪，正在加载...';
                status.textContent = '正在解析地形数据';
                localStorage.removeItem('terrainZipReady');
                await autoLoadFromIndexedDB();
            } else if (checkCount >= maxChecks) {
                clearInterval(checkInterval);
                document.getElementById('loading-title').textContent = '等待超时';
                message.textContent = '未收到数据，请重试';
                status.textContent = '即将关闭...';
                progress.style.width = '100%';
                progress.classList.remove('bg-blue-500');
                progress.classList.add('bg-red-500');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    progress.classList.remove('bg-red-500');
                    progress.classList.add('bg-blue-500');
                }, 2000);
            }
        }, 500);
    }

    // 从IndexedDB自动加载ZIP
    async function autoLoadFromIndexedDB() {
        const modal = document.getElementById('loading-modal');
        const progress = document.getElementById('loading-progress');
        const message = document.getElementById('loading-message');
        const status = document.getElementById('loading-status');
        
        try {
            status.textContent = '正在连接数据库...';
            progress.style.width = '92%';
            
            const db = await openIndexedDB();
            status.textContent = '正在读取数据...';
            progress.style.width = '95%';
            
            const data = await getZipFromIndexedDB(db);
            
            if (data && data.blob) {
                status.textContent = '正在解压文件...';
                progress.style.width = '97%';
                
                const zip = await JSZip.loadAsync(data.blob);
                const files = [];
                
                const promises = [];
                zip.forEach((relativePath, zipEntry) => {
                    if (!zipEntry.dir) {
                        promises.push(
                            zipEntry.async('blob').then(blob => {
                                return new File([blob], zipEntry.name, { type: blob.type });
                            })
                        );
                    }
                });
                
                const extractedFiles = await Promise.all(promises);
                
                progress.style.width = '99%';
                status.textContent = '正在渲染地形...';
                
                await processImportedFiles(extractedFiles);
                
                progress.style.width = '100%';
                document.getElementById('loading-title').textContent = '加载完成';
                message.textContent = '地形数据已成功加载';
                status.textContent = '正在关闭...';
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                    document.getElementById('loading-title').textContent = '等待数据';
                    progress.style.width = '0%';
                }, 1000);
                
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        } catch (err) {
            console.error('自动加载失败:', err);
            document.getElementById('loading-title').textContent = '加载失败';
            message.textContent = '错误: ' + err.message;
            status.textContent = '即将关闭...';
            progress.classList.remove('bg-blue-500');
            progress.classList.add('bg-red-500');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('loading-title').textContent = '等待数据';
                progress.classList.remove('bg-red-500');
                progress.classList.add('bg-blue-500');
            }, 2000);
        }
    }

    function openIndexedDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('TerrainSimDB', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('zipFiles')) {
                    db.createObjectStore('zipFiles');
                }
            };
        });
    }

    function getZipFromIndexedDB(db) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['zipFiles'], 'readonly');
            const store = transaction.objectStore('zipFiles');
            const request = store.get('latestZip');
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
        });
    }

    function updateSunPosition(elevationDegrees, azimuthDegrees) {
        const radius = 300;
        const elevationRad = (elevationDegrees * Math.PI) / 180;
        const azimuthRad = (azimuthDegrees * Math.PI) / 180;
        
        const x = radius * Math.cos(elevationRad) * Math.sin(azimuthRad);
        const y = radius * Math.sin(elevationRad);
        const z = radius * Math.cos(elevationRad) * Math.cos(azimuthRad);
        
        sunLight.position.set(x, y, z);
    }

    function createDefaultTerrain() {
        const size = 256;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const img = ctx.createImageData(size, size);
        for (let i = 0; i < img.data.length; i += 4) {
            let x = (i/4)%size, y = Math.floor((i/4)/size);
            let val = (Math.sin(x/15)*Math.cos(y/12) + Math.sin(Math.sqrt(x*x+y*y)/10)*0.5 + 1.2) * 80;
            img.data[i] = img.data[i+1] = img.data[i+2] = Math.max(0, Math.min(255, val));
            img.data[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);
        // 初始生成地形时渲染精度设为90，高度系数设为1（使用默认值）
        document.getElementById('detail-scale').value = 90;
        document.getElementById('detail-val').innerText = '90';

        buildTerrain(canvas);
    }

    async function parseGeotiff(arrayBuffer) {
        if (typeof GeoTIFF !== 'undefined') {
            console.warn('GeoTIFF 库未加载，尝试使用基本解析');
            return parseBasicTiff(arrayBuffer);
        }
        
        try {
            const tiff = await GeoTIFF.from(arrayBuffer);
            return tiff;
        } catch (error) {
            console.error('GeoTIFF 解析错误:', error);
            throw error;
        }
    }

    function parseBasicTiff(arrayBuffer) {
        const dataView = new DataView(arrayBuffer);
        let offset = 0;
        
        const readString = (offset, length) => {
            let result = '';
            for (let i = 0; i < length; i++) {
                result += String.fromCharCode(dataView.getUint8(offset + i));
            }
            return result;
        };
        
        const readUint16 = (offset, littleEndian) => {
            return littleEndian ? dataView.getUint16(offset, true) : dataView.getUint16(offset, false);
        };
        
        const readUint32 = (offset, littleEndian) => {
            return littleEndian ? dataView.getUint32(offset, true) : dataView.getUint32(offset, false);
        };
        
        const ifdOffset = readUint32(4, true);
        const tiffMagic = readUint16(0, true);
        
        if (tiffMagic !== 42) {
            throw new Error('不是有效的 TIFF 文件');
        }
        
        const numEntries = readUint16(ifdOffset, true);
        let width = 0, height = 0, bitsPerSample = 0, samplesPerPixel = 0;
        let dataOffset = 0;
        
        for (let i = 0; i < numEntries; i++) {
            const entryOffset = ifdOffset + 2 + i * 12;
            const tag = readUint16(entryOffset, true);
            const type = readUint16(entryOffset + 2, true);
            const count = readUint32(entryOffset + 4, true);
            const valueOffset = readUint32(entryOffset + 8, true);
            
            if (tag === 256) {
                width = readUint32(valueOffset, true);
            } else if (tag === 257) {
                height = readUint32(valueOffset, true);
            } else if (tag === 258) {
                bitsPerSample = readUint16(valueOffset, true);
            } else if (tag === 277) {
                samplesPerPixel = readUint16(valueOffset, true);
            } else if (tag === 273) {
                dataOffset = readUint32(valueOffset, true);
            }
        }
        
        if (width === 0 || height === 0) {
            throw new Error('无法读取图像尺寸');
        }
        
        const bytesPerSample = bitsPerSample / 8;
        const pixelData = new Uint8Array(arrayBuffer, dataOffset, width * height * bytesPerSample * samplesPerPixel);
        
        return {
            width: width,
            height: height,
            data: pixelData,
            bitsPerSample: bitsPerSample
        };
    }

    function buildTerrainFromGeotiff(tiff, skipContourCalc = false) {
        const width = tiff.width;
        const height = tiff.height;
        const data = tiff.data;
        
        rawWidth = width;
        rawHeight = height;
        
        let heightData;
        
        if (tiff.bitsPerSample === 16) {
            heightData = new Float32Array(width * height);
            for (let i = 0; i < width * height; i++) {
                const value = (data[i * 2] << 8) | data[i * 2 + 1];
                heightData[i] = value;
            }
        } else if (tiff.bitsPerSample === 8) {
            heightData = new Float32Array(width * height);
            for (let i = 0; i < width * height; i++) {
                heightData[i] = data[i];
            }
        } else {
            alert('不支持的位深度：' + tiff.bitsPerSample);
            return;
        }

        const segs = parseInt(document.getElementById('detail-scale').value);
        
        // 根据经纬度计算真实地形尺寸
        let terrainWidth, terrainHeight;
        const demInfo = window.demInfo;
        
        if (demInfo && demInfo.north !== null && demInfo.south !== null && 
            demInfo.east !== null && demInfo.west !== null) {
            // 有经纬度信息，计算真实尺寸
            const avgLat = (demInfo.north + demInfo.south) / 2;
            const latDiff = Math.abs(demInfo.north - demInfo.south);
            const lonDiff = Math.abs(demInfo.east - demInfo.west);
            
            // 东西长度（纬线长度）= 经度差 × 111km × cos(纬度)
            const realWidthMeters = lonDiff * 111000 * Math.cos(avgLat * Math.PI / 180);
            // 南北长度（经线长度）= 纬度差 × 111km
            const realHeightMeters = latDiff * 111000;
            
            // 缩放到合适的显示尺寸（保持真实比例）
            const maxDisplaySize = 300;
            const scaleFactor = maxDisplaySize / Math.max(realWidthMeters, realHeightMeters);
            terrainWidth = realWidthMeters * scaleFactor;
            terrainHeight = realHeightMeters * scaleFactor;
            
            // 存储真实尺寸信息供测量使用
            window.terrainRealSize = {
                realWidthMeters: realWidthMeters,
                realHeightMeters: realHeightMeters,
                displayWidth: terrainWidth,
                displayHeight: terrainHeight,
                avgLat: avgLat,
                north: demInfo.north,
                south: demInfo.south,
                east: demInfo.east,
                west: demInfo.west
            };
            
            console.log(`真实尺寸: ${realWidthMeters.toFixed(0)}m x ${realHeightMeters.toFixed(0)}m`);
            console.log(`显示尺寸: ${terrainWidth.toFixed(1)} x ${terrainHeight.toFixed(1)}`);
        } else {
            // 无经纬度信息，使用原始比例
            const aspectRatio = rawWidth / rawHeight;
            terrainWidth = 200 * Math.sqrt(aspectRatio);
            terrainHeight = 200 / Math.sqrt(aspectRatio);
            
            // 清除真实尺寸信息
            window.terrainRealSize = null;
        }
        
        geometry = new THREE.PlaneBufferGeometry(terrainWidth, terrainHeight, segs, segs);
        geometry.rotateX(-Math.PI/2);

        const pos = geometry.attributes.position.array;
        const heightSliderValue = parseFloat(document.getElementById('height-scale').value);
        const heightScale = logarithmicTransform(heightSliderValue, 0.01, 30);
        // 更新高度系数显示值
        document.getElementById('height-val').innerText = heightScale.toFixed(2) + 'x';
        const isSmooth = document.getElementById('render-mode-toggle').checked;
        const scaleMultiplier = isSmooth ? 0.5 : 0.3;
        
        // 计算原始高程范围（不受高度夸张影响）
        let rawMinHeight = Infinity;
        let rawMaxHeight = -Infinity;
        for (let i = 0; i < heightData.length; i++) {
            if (heightData[i] < rawMinHeight) rawMinHeight = heightData[i];
            if (heightData[i] > rawMaxHeight) rawMaxHeight = heightData[i];
        }
        
        // 存储原始高程范围供等高线和分层设色使用
        window.rawElevationRange = {
            min: rawMinHeight,
            max: rawMaxHeight,
            range: rawMaxHeight - rawMinHeight
        };
        
        let maxHeight = 0;
        let minHeight = Infinity;
        
        const normalizeHeight = (value) => {
            const minVal = Math.min(...heightData);
            const maxVal = Math.max(...heightData);
            return (value - minVal) / (maxVal - minVal) * 255;
        };
        
        // 清除terrainGroup中的所有子对象
        while(terrainGroup.children.length > 0) {
            const obj = terrainGroup.children[0];
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
            }
            terrainGroup.remove(obj);
        }

        // 创建原始高程比例属性（用于等高线和分层设色）
        const rawElevationArray = new Float32Array((segs + 1) * (segs + 1));
        
        for(let i=0, j=0; i<pos.length; i+=3, j++) {
            const x = Math.floor((j % (segs + 1)) / segs * (rawWidth - 1));
            const y = Math.floor(Math.floor(j / (segs + 1)) / segs * (rawHeight - 1));
            const idx = y * rawWidth + x;
            const rawElevation = heightData[idx];
            pos[i+1] = rawElevation * scaleMultiplier * heightScale;
            // 存储归一化的原始高程（0-1）
            rawElevationArray[j] = (rawElevation - rawMinHeight) / (rawMaxHeight - rawMinHeight);
            if(pos[i+1] > maxHeight) maxHeight = pos[i+1];
            if(pos[i+1] < minHeight) minHeight = pos[i+1];
        }
        
        // 添加原始高程属性到geometry
        geometry.setAttribute('aRawElevation', new THREE.BufferAttribute(rawElevationArray, 1));
        
        geometry.computeVertexNormals();

        // 自动计算最佳等高距（基于原始高程），仅在需要时计算
        if (rawMinHeight === Infinity) rawMinHeight = 0;
        if (rawMaxHeight === -Infinity) rawMaxHeight = 1;
        if (!skipContourCalc) {
            autoCalculateBestContourSpacing(rawMinHeight, rawMaxHeight);
        }

        material = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.1 });
        if(customTexture) material.map = customTexture;
        
        // 使用原始高程范围
        const maxHeightForShader = rawMaxHeight - rawMinHeight || 1;
        material.onBeforeCompile = getShaderCompileFunction(maxHeightForShader, rawMinHeight, rawMaxHeight);

        terrain = new THREE.Mesh(geometry, material);
        terrain.receiveShadow = terrain.castShadow = true;
        terrainGroup.add(terrain);
        
        terrainDimensions = { width: terrainWidth, height: terrainHeight };
        
        // 添加基座和方位标记
        addBaseAndDirections(terrainWidth, terrainHeight, segs, heightScale, scaleMultiplier, maxHeight);
        
        updateUniforms();
    }

    // 生成随机地形
    function generateRandomTerrain() {
        // 清除导入的DEM数据
        window.demInfo = null;
        window.terrainRealSize = null;
        window.rawElevationRange = null;
        
        // 清除DEM信息显示
        const displayEl = document.getElementById('dem-info-display');
        if (displayEl) {
            displayEl.innerHTML = '';
            displayEl.classList.add('hidden');
        }
        
        // 恢复等高线和等高距到初始状态
        document.getElementById('contour-toggle').checked = false;
        // 等高距20对应滑块值77（对数变换范围1-50）
        document.getElementById('contour-spacing').value = 77;
        document.getElementById('contour-spacing-val').innerText = '20.0';
        document.getElementById('contour-width').value = 1;
        document.getElementById('contour-width-val').innerText = '1.0';
        
        // 自动去除纹理
        customTexture = null;
        document.getElementById('remove-texture').classList.add('hidden');
        document.getElementById('texture-input').value = '';
        if(material) {
            material.map = null;
            material.needsUpdate = true;
        }
        
        const size = 512;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const img = ctx.createImageData(size, size);
        
        // 随机种子
        const seed = Math.random() * 1000;
        
        // 噪声函数
        function noise(x, y, s) {
            return Math.sin(x * 12.9898 + y * 78.233 + s) * 43758.5453 % 1;
        }
        
        // 平滑噪声
        function smoothNoise(x, y, s) {
            const ix = Math.floor(x);
            const iy = Math.floor(y);
            const fx = x - ix;
            const fy = y - iy;
            
            const v1 = noise(ix, iy, s);
            const v2 = noise(ix + 1, iy, s);
            const v3 = noise(ix, iy + 1, s);
            const v4 = noise(ix + 1, iy + 1, s);
            
            const sx = fx * fx * (3 - 2 * fx);
            const sy = fy * fy * (3 - 2 * fy);
            
            return v1 + (v2 - v1) * sx + (v3 - v1) * sy + (v4 - v3 - v2 + v1) * sx * sy;
        }
        
        // 分形噪声
        function fbm(x, y, octaves, s) {
            let value = 0;
            let amp = 0.5;
            let freq = 1;
            for(let i = 0; i < octaves; i++) {
                value += smoothNoise(x * freq, y * freq, s + i * 10) * amp;
                amp *= 0.5;
                freq *= 2;
            }
            return value;
        }
        
        // 生成地形
        for(let i = 0; i < img.data.length; i += 4) {
            const x = (i / 4) % size;
            const y = Math.floor((i / 4) / size);
            const nx = x / size;
            const ny = y / size;
            
            // 基础地形
            let val = fbm(nx * 4, ny * 4, 4, seed) * 0.5;
            
            // 中等细节
            val += fbm(nx * 8, ny * 8, 3, seed + 1) * 0.25;
            
            // 细节
            val += fbm(nx * 16, ny * 16, 2, seed + 2) * 0.125;
            
            // 山脊效果
            const ridge = Math.abs(fbm(nx * 6, ny * 6, 3, seed + 3) - 0.5) * 2;
            val += (1 - ridge) * (1 - ridge) * 0.3;
            
            // 归一化到0-255
            val = (val + 0.2) * 200;
            val = Math.max(0, Math.min(255, val));
            
            img.data[i] = img.data[i+1] = img.data[i+2] = val;
            img.data[i+3] = 255;
        }
        
        ctx.putImageData(img, 0, 0);
        // 生成随机地形时渲染精度设为90，高度系数保持默认值1
        document.getElementById('detail-scale').value = 90;
        document.getElementById('detail-val').innerText = '90';
        // 高度系数保持默认值1（滑块值58对应范围0.01-30）
        buildTerrain(canvas);
        
        // 更新DEM信息显示
        rawWidth = size;
        rawHeight = size;
        heightData = new Float32Array(size * size);
        for(let i = 0; i < img.data.length; i += 4) {
            heightData[i / 4] = img.data[i];
        }
        
        // 计算高程范围
        let minH = 255, maxH = 0;
        for(let i = 0; i < heightData.length; i++) {
            minH = Math.min(minH, heightData[i]);
            maxH = Math.max(maxH, heightData[i]);
        }
        minElevation = minH;
        maxElevation = maxH;
        displayDemInfo(minElevation, maxElevation);
        
        showImportStatus('随机地形生成成功');
    }

        };

        for (const file of files) {

            if (name.includes('dem.png')) {
                result.demPng = file;
            } else if (name.includes('dem.txt')) {
                result.demTxt = file;
            } else if (name.includes('sat.png')) {
                result.satPng = file;
            } else if (name.includes('openmap.png')) {
                result.openmapPng = file;
            } else if (name.includes('map.png')) {
                result.mapPng = file;
            } else if (name.includes('satellite.png')) {
                result.satellitePng = file;
            } else if (name.includes('esri.png')) {
                result.esriPng = file;
            } else if (name.includes('topo.png')) {
                result.topoPng = file;
            } else if (name.includes('natgeo.png')) {
                result.natgeoPng = file;
            } else if (name.includes('transport.png')) {
                result.transportPng = file;
            } else if (name.includes('relief.png')) {
                result.reliefPng = file;
            } else if (name.includes('osm.png')) {
                result.osmPng = file;
            } else if (name.includes('gaode.png')) {

        return result;
    }

    // 处理导入的文件
